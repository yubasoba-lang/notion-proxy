<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Hunter System</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg-card:#12121a;--bg-mid:#1a1a26;--border:#1e1e2e;--border-hi:#2a2a3e;--text:#e8e8f0;--text-dim:#5a5a7a;--text-faint:#2a2a3e;--orange:#ff6b2b;--blue:#4a9eff;--green:#4ade80;--red:#f87171;--bronze:#cd7f32;--silver:#b8b8b8;--gold:#ffd700;--platinum:#4fd6d6;--diamond:#a855f7;--champion:#3b82f6;--titan:#ef4444;--olympian:#f59e0b;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 50%,rgba(74,158,255,0.03) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(255,107,43,0.03) 0%,transparent 50%);pointer-events:none;z-index:0;}
#app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;background:rgba(10,10,15,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;}
.header-wordmark{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.1em;}
.header-wordmark span{color:var(--orange);}
.sync-btn{background:transparent;border:1px solid var(--border-hi);color:var(--text-dim);font-size:11px;font-weight:600;letter-spacing:0.08em;padding:6px 14px;cursor:pointer;border-radius:6px;transition:all 0.2s;}
.sync-btn:hover{color:var(--orange);border-color:var(--orange);}
.sync-btn:disabled{opacity:0.3;cursor:not-allowed;}
.nav{display:grid;grid-template-columns:repeat(3,1fr);background:rgba(10,10,15,0.98);border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 8px;background:none;border:none;cursor:pointer;color:var(--text-dim);transition:all 0.2s;position:relative;}
.nav-btn.active{color:var(--orange);}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--orange);border-radius:2px 2px 0 0;box-shadow:0 0 8px var(--orange);}
.nav-icon{font-size:17px;line-height:1;}
.nav-label{font-size:9px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;}
.scroll{flex:1;overflow-y:auto;padding:14px 14px 100px;-webkit-overflow-scrolling:touch;}
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:14px;}
.loader-ring{width:40px;height:40px;border:2px solid var(--border-hi);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-size:11px;font-weight:600;letter-spacing:0.12em;color:var(--text-dim);text-transform:uppercase;}
.error-bar{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:8px;color:var(--red);padding:12px 14px;font-size:12px;font-weight:500;margin-bottom:12px;line-height:1.5;}
.section-label{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:10px;margin:18px 0 10px;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}

/* Rank badge — fixed to show name + roman correctly */
.rank-badge{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;border:2px solid;position:relative;flex-direction:column;gap:1px;line-height:1;}
.rank-badge::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px solid;opacity:0.15;}
.rb-sm{width:38px;height:38px;border-width:1.5px;}
.rb-lg{width:80px;height:80px;border-width:3px;}
.rb-name{font-family:'Bebas Neue',sans-serif;letter-spacing:0.03em;}
.rb-sm .rb-name{font-size:9px;}
.rb-lg .rb-name{font-size:16px;}
.rb-roman{font-family:'Inter',sans-serif;font-weight:700;letter-spacing:0.05em;}
.rb-sm .rb-roman{font-size:7px;}
.rb-lg .rb-roman{font-size:11px;}
.rank-Bronze{border-color:var(--bronze);color:var(--bronze);background:rgba(205,127,50,0.08);}
.rank-Bronze::before{border-color:var(--bronze);}
.rank-Silver{border-color:var(--silver);color:var(--silver);background:rgba(184,184,184,0.08);}
.rank-Silver::before{border-color:var(--silver);}
.rank-Gold{border-color:var(--gold);color:var(--gold);background:rgba(255,215,0,0.08);}
.rank-Gold::before{border-color:var(--gold);}
.rank-Platinum{border-color:var(--platinum);color:var(--platinum);background:rgba(79,214,214,0.08);}
.rank-Platinum::before{border-color:var(--platinum);}
.rank-Diamond{border-color:var(--diamond);color:var(--diamond);background:rgba(168,85,247,0.08);}
.rank-Diamond::before{border-color:var(--diamond);}
.rank-Champion{border-color:var(--champion);color:var(--champion);background:rgba(59,130,246,0.08);}
.rank-Champion::before{border-color:var(--champion);}
.rank-Titan{border-color:var(--titan);color:var(--titan);background:rgba(239,68,68,0.08);}
.rank-Titan::before{border-color:var(--titan);}
.rank-Olympian{border-color:var(--olympian);color:var(--olympian);background:rgba(245,158,11,0.12);}
.rank-Olympian::before{border-color:var(--olympian);}

/* HOME */
.streak-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.streak-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 14px 12px;position:relative;overflow:hidden;}
.streak-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.streak-card.fire::before{background:linear-gradient(90deg,var(--orange),#ff9500);}
.streak-card.mind::before{background:linear-gradient(90deg,var(--blue),#7c3aed);}
.streak-card.sleep::before{background:linear-gradient(90deg,#7c3aed,var(--platinum));}
.streak-card.quest::before{background:linear-gradient(90deg,var(--green),#16a34a);}
.streak-icon{font-size:20px;margin-bottom:4px;display:block;}
.streak-number{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;letter-spacing:0.02em;}
.streak-label{font-size:9px;font-weight:700;letter-spacing:0.12em;color:var(--text-dim);text-transform:uppercase;margin-top:2px;}

/* TASKS */
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.action-btn{background:var(--bg-card);border:1px solid var(--border-hi);border-radius:10px;color:var(--text);font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:13px 10px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:5px;}
.action-btn:hover{border-color:var(--orange);color:var(--orange);}
.action-btn:active{transform:scale(0.97);}
.action-btn:disabled{opacity:0.35;cursor:not-allowed;}
.action-icon{font-size:18px;}
.template-section{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.template-section-title{font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.template-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.template-grid{display:flex;flex-wrap:wrap;gap:6px;}
.template-pill{background:var(--bg-mid);border:1px solid var(--border-hi);border-radius:6px;padding:7px 11px;font-size:12px;font-weight:500;color:var(--text);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.template-pill:hover{border-color:var(--orange);color:var(--orange);}
.template-pill:active{transform:scale(0.97);}
.date-header{font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--orange);display:flex;align-items:center;gap:8px;margin:16px 0 8px;}
.date-header::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(255,107,43,0.3),transparent);}
.cat-sub{font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin:8px 0 5px 2px;display:flex;align-items:center;gap:6px;}
.cat-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.task-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;transition:all 0.15s;user-select:none;}
.task-item:active{transform:scale(0.99);}
.task-item.done{opacity:0.28;}
.task-item.done .task-name{text-decoration:line-through;}
.task-cb{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border-hi);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:var(--orange);cursor:pointer;}
.task-item.done .task-cb{background:rgba(255,107,43,0.15);border-color:var(--orange);}
.task-body{flex:1;min-width:0;}
.task-name{font-size:13px;font-weight:500;line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-tags{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.diff-pill{font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:2px 7px;border-radius:4px;border:1px solid;cursor:pointer;transition:all 0.15s;}
.diff-pill:active{transform:scale(0.95);}
.diff-Maintenance{color:#64748b;border-color:#64748b40;background:#64748b10;}
.diff-Normal{color:var(--green);border-color:rgba(74,222,128,0.3);background:rgba(74,222,128,0.08);}
.diff-Heavy{color:var(--red);border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.08);}
.diff-Daily{color:var(--orange);border-color:rgba(255,107,43,0.3);background:rgba(255,107,43,0.08);}
.diff-Important{color:var(--diamond);border-color:rgba(168,85,247,0.3);background:rgba(168,85,247,0.08);}
.task-due{font-size:10px;font-weight:500;color:var(--text-dim);}
.task-due.overdue{color:var(--red);}
.empty{text-align:center;padding:40px 20px;color:var(--text-faint);font-size:11px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;}

/* STATS */
.silhouette-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;position:relative;overflow:hidden;}
.silhouette-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(255,107,43,0.04) 0%,transparent 60%);pointer-events:none;}
.silhouette-subtitle{font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;text-align:center;}
.silhouette-legend{display:flex;gap:14px;margin-top:10px;justify-content:center;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text-dim);}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.muscle-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.muscle-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.muscle-card:hover{border-color:var(--border-hi);}
.muscle-card.selected{border-width:1.5px;}
.muscle-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.muscle-card-name{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);}
.muscle-rank-pct{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;margin-bottom:2px;}
.muscle-rank-label{font-size:9px;color:var(--text-dim);margin-bottom:8px;font-weight:500;}
.prog-track{height:4px;background:var(--bg-mid);border-radius:2px;overflow:hidden;margin-bottom:6px;}
.prog-fill{height:100%;border-radius:2px;transition:width 0.8s ease;position:relative;overflow:hidden;}
.prog-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);animation:shimmer 2s linear infinite;}
@keyframes shimmer{from{transform:translateX(-100%);}to{transform:translateX(100%);}}
.muscle-rival{font-size:9px;font-weight:600;font-family:'JetBrains Mono',monospace;text-align:right;}
.detail-panel{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.detail-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.05em;}
.detail-stats{display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.detail-stat-div{background:var(--border);}
.detail-stat{background:var(--bg-card);padding:11px 8px;text-align:center;}
.detail-stat-label{font-size:8px;font-weight:700;letter-spacing:0.15em;color:var(--text-faint);text-transform:uppercase;margin-bottom:5px;}
.detail-stat-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;}

/* Toast */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--bg-mid);border:1px solid var(--border-hi);color:var(--text);padding:10px 20px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;z-index:200;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.5);animation:toast-up 0.2s ease;pointer-events:none;}
@keyframes toast-up{from{opacity:0;transform:translateX(-50%) translateY(6px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* Rank-up overlay */
.rankup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.rankup-overlay.visible{opacity:1;pointer-events:all;}
.rankup-eyebrow{font-size:11px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;}
.rankup-muscle{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:0.06em;color:var(--orange);animation:pop-in 0.5s cubic-bezier(0.175,0.885,0.32,1.275);}
.rankup-new{font-size:13px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;margin-top:16px;color:var(--text-dim);}
.rankup-tap{font-size:11px;color:var(--text-faint);letter-spacing:0.1em;margin-top:32px;animation:blink 1.5s ease infinite;}
@keyframes pop-in{0%{transform:scale(0.4);opacity:0;}70%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
@keyframes blink{0%,100%{opacity:0.3;}50%{opacity:1;}}
.rankup-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.particle{position:absolute;border-radius:50%;animation:fly-up 1.5s ease forwards;}
@keyframes fly-up{0%{transform:translateY(100vh) rotate(0deg);opacity:1;}100%{transform:translateY(-20vh) rotate(360deg);opacity:0;}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-wordmark">HUNTER <span>SYS</span></div>
    <button class="sync-btn" id="syncBtn" onclick="refresh()">↺ Sync</button>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('home',this)"><span class="nav-icon">🔥</span><span class="nav-label">Home</span></button>
    <button class="nav-btn" onclick="switchTab('tasks',this)"><span class="nav-icon">📋</span><span class="nav-label">Tasks</span></button>
    <button class="nav-btn" onclick="switchTab('stats',this)"><span class="nav-icon">💪</span><span class="nav-label">Stats</span></button>
  </div>
  <div class="scroll">
    <div id="error-bar" class="error-bar" style="display:none"></div>
    <div id="tab-home" class="tab-panel active"></div>
    <div id="tab-tasks" class="tab-panel" style="display:none"></div>
    <div id="tab-stats" class="tab-panel" style="display:none"></div>
  </div>
</div>

<div class="rankup-overlay" id="rankupOverlay" onclick="closeRankup()">
  <div class="rankup-particles" id="rankupParticles"></div>
  <div class="rankup-eyebrow">RANK UP</div>
  <div class="rankup-muscle" id="rankupMuscle"></div>
  <div id="rankupBadge" style="margin-top:16px"></div>
  <div class="rankup-new" id="rankupNew"></div>
  <div class="rankup-tap">tap to continue</div>
</div>

<script>
const PROXY = '/api/notion';
const DB = {
  stats:    '34163a0b4e7c81abb22ae7e6bccdf2c2',
  rivals:   'f925bdca42f3428fa6f2c61594ae512a',
  tasks:    '34163a0b4e7c81a5a8aefb94b96a6b36',
  templates:'34163a0b4e7c81a08eefdcd464d0a5a6',
  dailyLog: '35063a0b4e7c80c9889cf67fa1166d90',
};

// ── Rank system ──
// Notion rank strings look like "🥉BRONZE III🥉" or "SILVER II" etc.
const TIER_NAMES = ['Bronze','Silver','Gold','Platinum','Diamond','Champion','Titan','Olympian'];
const TIER_COLORS = {
  Bronze:'#cd7f32', Silver:'#b8b8b8', Gold:'#ffd700',
  Platinum:'#4fd6d6', Diamond:'#a855f7', Champion:'#3b82f6',
  Titan:'#ef4444', Olympian:'#f59e0b'
};
const ROMANS = ['I','II','III'];
const ALL_RANKS = [];
const TIER_XP = [
  [0,50,120], [220,360,550], [800,1100,1500],
  [2000,2700,3600], [4800,6300,8100],
  [10200,12600,15300], [18300,21600,25200], [29100,33300,38000]
];
TIER_NAMES.forEach((name,ti)=>{
  TIER_XP[ti].forEach((min,ri)=>{
    ALL_RANKS.push({name, roman:ROMANS[ri], color:TIER_COLORS[name], min, full:`${name} ${ROMANS[ri]}`});
  });
});

function getRankFromXP(xp) {
  let r=ALL_RANKS[0], next=ALL_RANKS[1];
  for(let i=ALL_RANKS.length-1;i>=0;i--){
    if(xp>=ALL_RANKS[i].min){r=ALL_RANKS[i];next=ALL_RANKS[i+1]??null;break;}
  }
  const pct=next?Math.min(((xp-r.min)/(next.min-r.min))*100,100):100;
  return {rank:r,next,pct};
}

// Parse Notion rank string — handles "🥉BRONZE III🥉", "SILVER II", "Gold III" etc.
function parseRankStr(str) {
  if (!str) return null;
  const upper = str.toUpperCase().replace(/[^A-Z\s]/g,'').trim();
  for (const name of TIER_NAMES) {
    if (upper.includes(name.toUpperCase())) {
      // find roman numeral — check III before II before I to avoid partial match
      for (const roman of ['III','II','I']) {
        if (upper.includes(roman)) {
          return ALL_RANKS.find(r=>r.name===name&&r.roman===roman) ?? null;
        }
      }
      // no roman found — default to I
      return ALL_RANKS.find(r=>r.name===name&&r.roman==='I') ?? null;
    }
  }
  return null;
}

function badgeHTML(rankObj, sizeClass='rb-sm') {
  if (!rankObj) return '<div class="rank-badge rank-Bronze rb-sm"><span class="rb-name">?</span></div>';
  return `<div class="rank-badge rank-${rankObj.name} ${sizeClass}">
    <span class="rb-name">${rankObj.name.slice(0,5).toUpperCase()}</span>
    <span class="rb-roman">${rankObj.roman}</span>
  </div>`;
}

const CAT_COLOR={Body:'#ef5350',Mind:'#42a5f5',Life:'#66bb6a',German:'#ffa726'};
const DIFF_ORDER=['Maintenance','Normal','Heavy','Daily','Important'];

// Muscle positions in the SVG (cx%, cy% of 200x400 viewbox)
const MUSCLE_POS={
  Chest:     {x:100,y:108},
  Core:      {x:100,y:148},
  Back:      {x:100,y:125},
  Shoulder:  {x:60, y:85},
  Biceps:    {x:38, y:118},
  Triceps:   {x:162,y:118},
  Forearms:  {x:32, y:165},
  Legs:      {x:100,y:248},
  Plyometrics:{x:62,y:290},
  Cardio:    {x:138,y:290},
};

let state={stats:[],rivals:[],tasks:[],templates:[],streaks:null};
let currentTab='home';
let selectedMuscle=null;
let prevRanks={};

// ── Notion API ──
async function notionFetch(path,method='GET',body){
  const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path,method,body})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error??`Error ${res.status}`);}
  return res.json();
}
const nQuery=(dbId,filter,sorts)=>notionFetch(`/databases/${dbId}/query`,'POST',{page_size:100,...(filter?{filter}:{}),...(sorts?{sorts}:{})}).then(d=>d.results??[]);
const nPatch=(id,props)=>notionFetch(`/pages/${id}`,'PATCH',{properties:props});
const nCreate=(dbId,props)=>notionFetch('/pages','POST',{parent:{database_id:dbId},properties:props});

// Property extractors — handle formula, rollup, plain values
const g={
  title:v=>v?.title?.[0]?.plain_text??'',
  text:v=>v?.rich_text?.[0]?.plain_text??'',
  select:v=>v?.select?.name??null,
  checkbox:v=>v?.checkbox??false,
  date:v=>v?.date?.start??null,
  num:v=>v?.number??0,
  formula:v=>{
    const f=v?.formula;if(!f)return null;
    // formula can return number, string, boolean
    if(f.type==='number')return f.number;
    if(f.type==='string')return f.string;
    if(f.type==='boolean')return f.boolean;
    return null;
  },
  rollup:v=>{
    const r=v?.rollup;if(!r)return null;
    if(r.type==='number')return r.number;
    if(r.type==='array'){
      const first=r.array?.[0];
      if(!first)return null;
      if(first.type==='formula'){
        const f=first.formula;
        if(f.type==='number')return f.number;
        if(f.type==='string')return f.string;
      }
      if(first.type==='number')return first.number;
      if(first.type==='title')return first.title?.[0]?.plain_text??null;
    }
    return null;
  },
  rollupStr:v=>{
    const r=v?.rollup;if(!r)return null;
    if(r.type==='array'){
      const first=r.array?.[0];
      if(!first)return null;
      if(first.type==='formula'&&first.formula?.type==='string')return first.formula.string;
      if(first.type==='title')return first.title?.[0]?.plain_text??null;
    }
    return null;
  },
};

const toStat=p=>{
  const q=p.properties;
  return {
    id:p.id,
    name:g.title(q.Name),
    finalXP:g.formula(q['Final XP'])??0,
    rankStr:g.formula(q.Rank)??'',    // formula returns string like "🥉BRONZE III🥉"
    rivalGapNum:g.rollup(q['Rival Gap']),   // rollup of a formula(number) field
    rivalXP:g.rollup(q['Rival XP'])??0,
    lastTrained:g.rollup(q['Last day trained']),
    cat:g.select(q.Cat),
  };
};

// Rivals DB — query separately and join by Body Part name
const toRival=p=>{
  const q=p.properties;
  return {
    id:p.id,
    bodyPart:g.select(q['Body Part']),
    totalXP:g.formula(q['Total XP'])??0,
    gapNumber:g.formula(q['Gap in numbers'])??0,   // number formula
    gapStr:g.formula(q.Gap)??'',                   // string formula like "+44 XP ahead"
    rankStr:g.formula(q.Rank)??'',
    myCurrentXP:g.rollup(q['My current XP'])??0,
  };
};

const toTask=p=>{
  const q=p.properties;
  return {
    id:p.id, name:g.title(q.Task),
    cat:g.select(q.Cat), difficulty:g.select(q.Difficulty),
    status:g.checkbox(q.Status),
    missed:g.checkbox(q['Missed check1']),
    dueDate:g.date(q['Due Date']),
  };
};

const toTemplate=p=>{
  const q=p.properties;
  return {id:p.id,name:g.title(q.Name),cat:g.select(q.Cat),type:g.select(q.Type)};
};

const toStreak=p=>{
  const q=p.properties;
  return {
    workout:g.formula(q['Workout streak'])??0,
    mind:g.formula(q['Mind streak'])??0,
    sleep:g.formula(q['Sleep streak'])??0,
    quest:g.formula(q['Quest Perfect Day'])??0,
  };
};

// ── UI helpers ──
function setError(msg){const el=document.getElementById('error-bar');if(msg){el.textContent=msg;el.style.display='block';}else el.style.display='none';}
function showToast(msg,ms=2500){document.querySelectorAll('.toast').forEach(t=>t.remove());const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),ms);}
function setSyncBusy(b){const btn=document.getElementById('syncBtn');btn.disabled=b;btn.textContent=b?'Syncing…':'↺ Sync';}

// Rank-up detection
function checkRankUps(newStats){
  newStats.forEach(s=>{
    const old=prevRanks[s.id];
    if(old&&old!==s.rankStr&&s.rankStr){
      const r=parseRankStr(s.rankStr);
      if(r)triggerRankUp(s.name,r);
    }
    prevRanks[s.id]=s.rankStr;
  });
}
function triggerRankUp(name,rankObj){
  document.getElementById('rankupMuscle').textContent=name.toUpperCase();
  document.getElementById('rankupNew').textContent=rankObj.full;
  document.getElementById('rankupBadge').innerHTML=badgeHTML(rankObj,'rb-lg');
  const container=document.getElementById('rankupParticles');
  container.innerHTML='';
  for(let i=0;i<35;i++){
    const p=document.createElement('div');p.className='particle';
    const sz=3+Math.random()*5;
    p.style.cssText=`left:${Math.random()*100}%;bottom:0;width:${sz}px;height:${sz}px;background:${rankObj.color};animation-delay:${Math.random()*0.6}s;animation-duration:${1+Math.random()}s;`;
    container.appendChild(p);
  }
  document.getElementById('rankupOverlay').classList.add('visible');
}
function closeRankup(){document.getElementById('rankupOverlay').classList.remove('visible');}

// ── Loaders ──
async function loadStats(){
  try{
    const pages=await nQuery(DB.stats);
    const ns=pages.map(toStat);
    checkRankUps(ns);
    state.stats=ns;
  }catch(e){setError('Stats: '+e.message);}
}

async function loadRivals(){
  try{
    const pages=await nQuery(DB.rivals);
    state.rivals=pages.map(toRival);
  }catch(e){console.error('Rivals:',e);}
}

async function loadTasks(){
  try{
    const today=new Date().toISOString().split('T')[0];
    const pages=await nQuery(DB.tasks,{
      and:[
        {property:'Status',checkbox:{equals:false}},
        {property:'Missed check1',checkbox:{equals:false}},
        {or:[
          {property:'Due Date',date:{on_or_before:today}},
          {property:'Due Date',date:{is_empty:true}},
        ]},
      ],
    },[{property:'Due Date',direction:'ascending'}]);
    state.tasks=pages.map(toTask);
  }catch(e){setError('Tasks: '+e.message);}
}

async function loadTemplates(){
  try{const pages=await nQuery(DB.templates);state.templates=pages.map(toTemplate);}
  catch(e){console.error(e);}
}

async function loadStreaks(){
  try{
    const today=new Date().toISOString().split('T')[0];
    let pages=await nQuery(DB.dailyLog,{property:'Date',date:{equals:today}});
    if(!pages.length)pages=await nQuery(DB.dailyLog,undefined,[{property:'Date',direction:'descending'}]);
    if(pages.length)state.streaks=toStreak(pages[0]);
  }catch(e){setError('Streaks: '+e.message);}
}

async function refresh(){
  setError(null);setSyncBusy(true);
  if(currentTab==='home'){await Promise.all([loadStreaks(),loadStats(),loadRivals()]);renderHome();}
  if(currentTab==='tasks'){await Promise.all([loadTasks(),loadTemplates()]);renderTasks();}
  if(currentTab==='stats'){await Promise.all([loadStats(),loadRivals()]);renderStats();}
  setSyncBusy(false);
}

function switchTab(tab,btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>{p.style.display='none';p.classList.remove('active');});
  btn.classList.add('active');
  const panel=document.getElementById('tab-'+tab);
  panel.style.display='block';panel.classList.add('active');
  currentTab=tab;refresh();
}

// Get rival data for a given muscle name

  return state.rivals.find(r=>r.bodyPart&&r.bodyPart.toLowerCase()===muscleName.toLowerCase())??null;

function buildSilhouette(bodyStats){
  const statMap={};
  bodyStats.forEach(s=>{statMap[s.name.toLowerCase()]=s;});
  const today=new Date();

  function isActive(name){
    const s=statMap[name.toLowerCase()];
    if(!s?.lastTrained)return false;
    return (today-new Date(s.lastTrained))/(1000*60*60*24)<=5;
  }
  function getRankColor(name){
    const s=statMap[name.toLowerCase()];
    if(!s)return '#2a2a3e';
    const r=parseRankStr(s.rankStr);
    return r?r.color:getRankFromXP(s.finalXP).rank.color;
  }

  const musclePath=(name,path)=>{
    const active=isActive(name);
    const color=getRankColor(name);
    const s=statMap[name.toLowerCase()];
    const sel=selectedMuscle===s?.id;
    return `<path d="${path}" fill="${active?color+'1a':'#1e1e2e'}" stroke="${active?color:'#2a2a3e'}"
      stroke-width="${sel?2:active?1.5:0.8}" style="transition:all 0.3s;cursor:pointer;"
      onclick="selectMuscle('${s?.id??''}','${name}')"

function renderTasks(){
  const today=new Date();today.setHours(0,0,0,0);
  const CATS=['Body','Mind','Life','German'];

  // Quick add templates grouped by cat
  const tGroups={};
  state.templates.forEach(t=>{const c=t.cat??'Other';if(!tGroups[c])tGroups[c]=[];tGroups[c].push(t);});

  let html=`<div class="action-row">
    <button class="action-btn" onclick="addDailyTasks()"><span class="action-icon">☀️</span>Daily Tasks</button>
    <button class="action-btn" onclick="addWorkout()"><span class="action-icon">🏋️</span>Workout</button>
  </div>`;

  const tEntries=Object.entries(tGroups).filter(([,ts])=>ts.length);
  if(tEntries.length){
    html+=`<div class="section-label">Quick Add</div>`;
    tEntries.forEach(([cat,ts])=>{
      const color=CAT_COLOR[cat]??'var(--text-dim)';
      html+=`<div class="template-section">
        <div class="template-section-title"><div class="template-dot" style="background:${color}"></div>${cat}</div>
        <div class="template-grid">${ts.map(t=>`<div class="template-pill" onclick="quickAdd('${t.id}','${t.name.replace(/'/g,"\\'")}','${t.cat??''}','${t.type??''}')">${t.name}</div>`).join('')}</div>
      </div>`;
    });
  }

  // Group tasks by date
  const dGroups={};
  state.tasks.forEach(t=>{
    let label='No Date';
    if(t.dueDate){
      const d=new Date(t.dueDate);d.setHours(0,0,0,0);
      const diff=Math.round((today-d)/(1000*60*60*24));
      label=diff===0?'Today':diff===1?'Yesterday':diff>1?`${diff} Days Ago`:'Upcoming';
    }
    if(!dGroups[label])dGroups[label]=[];
    dGroups[label].push(t);
  });

  const dOrder=['Today','Yesterday'];
  const dSorted=Object.keys(dGroups).sort((a,b)=>{
    const ai=dOrder.indexOf(a),bi=dOrder.indexOf(b);
    if(ai>-1&&bi>-1)return ai-bi;
    if(ai>-1)return -1;if(bi>-1)return 1;
    const an=parseInt(a),bn=parseInt(b);
    return isNaN(an)||isNaN(bn)?0:bn-an;
  });

  html+=`<div class="section-label">Tasks</div>`;
  if(!state.tasks.length){html+='<div class="empty">No pending tasks</div>';}
  else{
    dSorted.forEach(dl=>{
      html+=`<div class="date-header">${dl}</div>`;
      CATS.forEach(cat=>{
        const ct=dGroups[dl].filter(t=>t.cat===cat);
        if(!ct.length)return;
        html+=`<div class="cat-sub"><div class="cat-dot" style="background:${CAT_COLOR[cat]}"></div>${cat}</div>`;
        ct.forEach(t=>{html+=taskHTML(t,today);});
      });
      const ot=dGroups[dl].filter(t=>!t.cat||!CATS.includes(t.cat));
      if(ot.length){html+=`<div class="cat-sub"><div class="cat-dot" style="background:var(--text-dim)"></div>Other</div>`;ot.forEach(t=>{html+=taskHTML(t,today);});}
    });
  }
  document.getElementById('tab-tasks').innerHTML=html;
}

function taskHTML(task,today){
  const overdue=task.dueDate&&new Date(task.dueDate)<today;
  const dueStr=task.dueDate?new Date(task.dueDate).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):null;
  const diff=task.difficulty;
  return `<div class="task-item ${task.status?'done':''}" id="task-${task.id}">
    <div class="task-cb" onclick="toggleTask('${task.id}',${task.status})">${task.status?'✓':''}</div>
    <div class="task-body">
      <div class="task-name">${task.name||'Unnamed'}</div>
      <div class="task-tags">
        ${diff?`<span class="diff-pill diff-${diff}" onclick="cycleDiff(event,'${task.id}','${diff}')">${diff}</span>`:''}
        ${dueStr?`<span class="task-due ${overdue?'overdue':''}">${overdue?'⚠ ':''}${dueStr}</span>`:''}
      </div>
    </div>
  </div>`;
}

    const rival=getRivalForMuscle(selStat.name);

        ${badgeHTML(r,'rb-lg')}
      </div>
      <div class="detail-stats">
        <div class="detail-stat"><div class="detail-stat-label">Progress</div><div class="detail-stat-val" style="color:${r.color}">${Math.round(pct)}%</div></div>
        <div class="detail-stat-div"></div>
        <div class="detail-stat"><div class="detail-stat-label">vs 影</div><div class="detail-stat-val" style="color:${isAhead?'var(--green)':isBehind?'var(--red)':'var(--text-dim)'}">${gap!==null?(isAhead?'▲':'▼')+Math.abs(gap):'—'}</div></div>
        <div class="detail-stat-div"></div>
        <div class="detail-stat"><div class="detail-stat-label">Last</div><div class="detail-stat-val" style="color:var(--text-dim);font-size:11px">${lastStr}</div></div>
      </div>
    </div>`;
  }

  // Muscle grid
  html+=`<div class="section-label">All Muscles</div><div class="muscle-cards">`;
  bodyStats.forEach(stat=>{
    const parsed=parseRankStr(stat.rankStr);
    const {rank,next,pct}=getRankFromXP(stat.finalXP);
    const r=parsed??rank;
    const rival=getRivalForMuscle(stat.name);
    const gap=rival?.gapNumber??null;
    const isAhead=gap!==null&&gap>0,isBehind=gap!==null&&gap<0;
    const sel=selectedMuscle===stat.id;
    html+=`<div class="muscle-card ${sel?'selected':''}" onclick="selectMuscle('${stat.id}','${stat.name}')" style="${sel?`border-color:${r.color};`:''}">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${sel?r.color:'transparent'}"></div>
      <div class="muscle-card-top"><span class="muscle-card-name">${stat.name}</span>${badgeHTML(r,'rb-sm')}</div>
      <div class="muscle-rank-pct" style="color:${r.color}">${Math.round(pct)}%</div>
      <div class="muscle-rank-label">of ${r.full}</div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,${r.color}55,${r.color})"></div></div>
      ${gap!==null?`<div class="muscle-rival" style="color:${isAhead?'var(--green)':isBehind?'var(--red)':'var(--text-dim)'}">${isAhead?'▲':isBehind?'▼':'='} ${Math.abs(gap)} vs 影</div>`:''}
    </div>`;
  });
  html+='</div>';
  document.getElementById('tab-stats').innerHTML=html;
}

function selectMuscle(id,name){
  if(!id)return;
  selectedMuscle=selectedMuscle===id?null:id;
  renderStats();
  if(selectedMuscle){const p=document.getElementById('detailPanel');if(p)setTimeout(()=>p.scrollIntoView({behavior:'smooth',block:'nearest'}),50);}
}

// ── Actions ──
async function toggleTask(taskId,current){
  const next=!current;
  state.tasks=state.tasks.map(t=>t.id===taskId?{...t,status:next}:t);
  renderTasks();
  try{
    await nPatch(taskId,{Status:{checkbox:next}});
    showToast(next?'✓ Done':'Reopened');
    if(next)setTimeout(()=>{state.tasks=state.tasks.filter(t=>t.id!==taskId);renderTasks();},700);
  }catch(e){state.tasks=state.tasks.map(t=>t.id===taskId?{...t,status:current}:t);renderTasks();showToast('Update failed');}
}

async function cycleDiff(e,taskId,cur){
  e.stopPropagation();
  const next=DIFF_ORDER[(DIFF_ORDER.indexOf(cur)+1)%DIFF_ORDER.length];
  state.tasks=state.tasks.map(t=>t.id===taskId?{...t,difficulty:next}:t);
  renderTasks();
  try{await nPatch(taskId,{Difficulty:{select:{name:next}}});showToast(`→ ${next}`);}
  catch(e){state.tasks=state.tasks.map(t=>t.id===taskId?{...t,difficulty:cur}:t);renderTasks();showToast('Update failed');}
}

async function quickAdd(tid,name,cat,type){
  const today=new Date().toISOString().split('T')[0];
  try{
    await nCreate(DB.tasks,{
      Task:{title:[{text:{content:name}}]},
      ...(cat?{Cat:{select:{name:cat}}}:{}),
      ...(type==='Daily'?{Difficulty:{select:{name:'Daily'}}}:type==='Weekly'?{Difficulty:{select:{name:'Heavy'}}}:{}),
      Status:{checkbox:false},'Due Date':{date:{start:today}},
    });
    showToast(`✓ ${name}`);
    await loadTasks();renderTasks();
  }catch(e){showToast('Failed');}
}

async function addDailyTasks(){
  const today=new Date().toISOString().split('T')[0];
  const daily=state.templates.filter(t=>t.type==='Daily');
  if(!daily.length){showToast('No daily templates');return;}
  try{
    await Promise.all(daily.map(t=>nCreate(DB.tasks,{Task:{title:[{text:{content:t.name}}]},...(t.cat?{Cat:{select:{name:t.cat}}}:{}),Difficulty:{select:{name:'Daily'}},Status:{checkbox:false},'Due Date':{date:{start:today}}})));
    showToast(`${daily.length} daily tasks added`);await loadTasks();renderTasks();
  }catch(e){showToast('Failed');}
}

async function addWorkout(){
  const today=new Date().toISOString().split('T')[0];
  const w=state.templates.filter(t=>t.type==='Weekly'||t.cat==='Body');
  if(!w.length){showToast('No workout templates');return;}
  try{
    await Promise.all(w.map(t=>nCreate(DB.tasks,{Task:{title:[{text:{content:t.name}}]},Cat:{select:{name:'Body'}},Difficulty:{select:{name:'Heavy'}},Status:{checkbox:false},'Due Date':{date:{start:today}}})));
    showToast(`${w.length} workout tasks added`);await loadTasks();renderTasks();
  }catch(e){showToast('Failed');}
}

// Init
document.querySelectorAll('.tab-panel').forEach((p,i)=>{if(i>0)p.style.display='none';});
refresh();
</script>
