<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070810">
<title>GRIND</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0c0c0f;
  --bg-card:   #111116;
  --bg-mid:    #17171e;
  --bg-hi:     #1e1e28;
  --border:    #1a1a22;
  --border-hi: #28283a;
  --border-glow: #2e2e42;
  --text:      #c8c8d8;
  --text-dim:  #48485e;
  --text-faint:#22222e;
  --gold:      #b8942a;
  --gold-hi:   #d4aa3a;
  --gold-dim:  #6a5418;
  --gold-glow: rgba(184,148,42,0.15);
  --green:     #1e4a2e;
  --green-hi:  #2a6a3e;
  --green-text:#3a9a5e;
  --red-text:  #8a3030;
  --red-hi:    #c04040;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

/* Obsidian texture — very subtle stone-like noise */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(184,148,42,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(184,148,42,0.02) 0%, transparent 40%);
  pointer-events: none; z-index: 0;
}

#app { max-width: 430px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 1; }

/* ── Header ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px;
  background: rgba(12,12,15,0.98);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  flex-shrink: 0;
}
.wordmark { font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 0.18em; color: var(--text); }
.wordmark em { color: var(--gold); font-style: normal; }
.sync-btn {
  background: transparent;
  border: 1px solid var(--border-hi);
  color: var(--text-dim);
  font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
  padding: 5px 12px; cursor: pointer; border-radius: 3px;
  transition: all 0.25s; text-transform: uppercase;
  font-family: 'Inter', sans-serif;
}
.sync-btn:hover { color: var(--gold); border-color: var(--gold-dim); }
.sync-btn:disabled { opacity: 0.25; cursor: not-allowed; }

/* ── Nav ── */
.nav {
  display: grid; grid-template-columns: repeat(3, 1fr);
  background: rgba(12,12,15,0.99);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 9px 4px 7px; background: none; border: none; cursor: pointer;
  color: var(--text-dim); transition: all 0.2s; position: relative;
}
.nav-btn.active { color: var(--gold); }
.nav-btn.active::after {
  content: ''; position: absolute; bottom: 0; left: 25%; right: 25%;
  height: 1px; background: var(--gold);
  box-shadow: 0 0 8px var(--gold-dim);
}
.nav-icon { font-size: 14px; line-height: 1; }
.nav-label { font-size: 8px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }

.scroll { flex: 1; overflow-y: auto; padding: 14px 14px 100px; -webkit-overflow-scrolling: touch; }

/* ── Loader ── */
.loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 70px 20px; gap: 14px; }
.loader-ring { width: 32px; height: 32px; border: 1.5px solid var(--border-hi); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 9px; font-weight: 600; letter-spacing: 0.18em; color: var(--text-dim); text-transform: uppercase; }

.error-bar { background: rgba(138,48,48,0.1); border: 1px solid rgba(138,48,48,0.2); border-radius: 4px; color: #a05050; padding: 10px 12px; font-size: 11px; margin-bottom: 10px; line-height: 1.5; }

/* ── Section label ── */
.section-label {
  font-size: 8px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text-faint); display: flex; align-items: center; gap: 10px; margin: 16px 0 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }
.empty { text-align: center; padding: 40px 20px; color: var(--text-faint); font-size: 9px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; }

/* ══════════════════════════════
   RANK BADGE SVG — image based
   ══════════════════════════════ */
.badge-wrap { display: inline-flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
.badge-wrap svg { display: block; }

/* ── HOME — Streaks ── */
.streak-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.streak-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px 14px 14px;
  position: relative; overflow: hidden;
}
.streak-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--border-glow), transparent); }

/* Clean geometric streak icons */
.streak-ico { width: 20px; height: 20px; margin-bottom: 10px; flex-shrink: 0; }
.fire-ico  { background: var(--gold); clip-path: polygon(50% 0%, 80% 30%, 95% 60%, 75% 85%, 50% 100%, 25% 85%, 5% 60%, 20% 30%); opacity: 0.8; }
.mind-ico  { background: #3060b0; border-radius: 50%; opacity: 0.8; }
.sleep-ico { background: #5030a0; clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); opacity: 0.8; }
.quest-ico { background: var(--green-text); clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); opacity: 0.8; }

.streak-number { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; letter-spacing: 0.01em; color: var(--text); }
.streak-label  { font-size: 8px; font-weight: 700; letter-spacing: 0.18em; color: var(--text-dim); text-transform: uppercase; margin-top: 4px; }

/* ── Body mini cards ── */
.muscle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.muscle-mini {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px; cursor: pointer;
  transition: border-color 0.2s; position: relative; overflow: hidden;
  min-height: 100px;
}
.muscle-mini:hover { border-color: var(--border-glow); }
.muscle-mini-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; gap: 4px; }
.muscle-mini-name { font-size: 8px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); }
.muscle-pct-big  { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.02em; margin-bottom: 1px; line-height: 1; }
.muscle-of       { font-size: 9px; color: var(--text-dim); margin-bottom: 8px; font-weight: 500; letter-spacing: 0.04em; }
.prog-track      { height: 2px; background: var(--bg-hi); border-radius: 1px; overflow: hidden; margin-bottom: 5px; }
.prog-fill       { height: 100%; border-radius: 1px; transition: width 0.9s ease; }

/* Days inactive badge */
.muscle-bottom-row { display: flex; align-items: center; justify-content: space-between; }
.days-inactive { font-size: 9px; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: var(--text-faint); letter-spacing: 0.04em; }
.days-inactive.active { color: var(--green-text); }
.days-inactive.recent { color: var(--text-dim); }
.days-inactive.stale  { color: var(--text-faint); }
.muscle-vs       { font-size: 9px; font-weight: 600; font-family: 'JetBrains Mono', monospace; text-align: right; }

/* ── TASKS ── */
.action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.action-btn {
  background: var(--bg-card); border: 1px solid var(--border-hi);
  border-radius: 6px; color: var(--text-dim);
  font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 12px 8px; cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  font-family: 'Inter', sans-serif;
}
.action-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
.action-btn:active { transform: scale(0.97); }
.action-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.action-btn-icon { font-size: 14px; }
.action-btn.gold-btn { border-color: var(--gold-dim); color: var(--gold); }
.action-btn.gold-btn:hover { background: var(--gold-glow); }

.tmpl-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 10px; margin-bottom: 6px; }
.tmpl-title { font-size: 8px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 7px; display: flex; align-items: center; gap: 5px; }
.tmpl-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
.tmpl-pills { display: flex; flex-wrap: wrap; gap: 5px; }
.tmpl-pill {
  background: var(--bg-mid); border: 1px solid var(--border-hi);
  border-radius: 3px; padding: 5px 9px; font-size: 11px; font-weight: 500;
  color: var(--text-dim); cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.tmpl-pill:hover { border-color: var(--gold-dim); color: var(--gold); }
.tmpl-pill:active { transform: scale(0.97); }

.date-hdr {
  font-size: 9px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--gold-dim); display: flex; align-items: center; gap: 8px; margin: 14px 0 7px;
}
.date-hdr::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--gold-dim), transparent); opacity: 0.4; }

.cat-sub { font-size: 8px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin: 7px 0 4px 2px; display: flex; align-items: center; gap: 5px; }
.cat-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }

.task-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 5px; margin-bottom: 4px; transition: border-color 0.15s; user-select: none; position: relative;
}
.task-item:active { transform: scale(0.99); }
.task-item.done { opacity: 0.22; }
.task-item.done .task-name { text-decoration: line-through; }
.task-item.is-quest { border-color: var(--gold-dim); }
.task-item.is-quest::before { content: ''; position: absolute; left: 0; top: 3px; bottom: 3px; width: 1.5px; background: var(--gold); border-radius: 0 1px 1px 0; opacity: 0.7; }

.task-cb { width: 16px; height: 16px; border-radius: 3px; border: 1px solid var(--border-hi); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 9px; cursor: pointer; transition: all 0.15s; }
.task-item.done .task-cb { background: rgba(42,106,62,0.2); border-color: var(--green-text); color: var(--green-text); }
.task-item.is-quest .task-cb { border-color: var(--gold-dim); }

.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 13px; font-weight: 400; line-height: 1.3; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.task-tags { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }

.diff-pill { font-size: 8px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 6px; border-radius: 2px; border: 1px solid; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
.diff-pill:active { transform: scale(0.95); }
.diff-Maintenance { color: var(--text-faint); border-color: var(--border); background: transparent; }
.diff-Normal      { color: #286040; border-color: #1a3a28; background: #0a1810; }
.diff-Heavy       { color: #6a2020; border-color: #3a1010; background: #140808; }
.diff-Daily       { color: var(--gold-dim); border-color: var(--gold-dim); background: var(--gold-glow); }
.diff-Important   { color: #4a2870; border-color: #2a1848; background: #100818; }

.quest-tag { font-size: 8px; font-weight: 700; letter-spacing: 0.08em; color: var(--gold-dim); border: 1px solid var(--gold-dim); border-radius: 2px; padding: 2px 5px; background: var(--gold-glow); flex-shrink: 0; }
.task-due { font-size: 9px; font-weight: 500; color: var(--text-faint); }
.task-due.overdue { color: var(--red-hi); }

/* ── STATS ── */
.sil-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; position: relative; overflow: hidden; }
.sil-wrap::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 20%, rgba(184,148,42,0.03) 0%, transparent 60%); pointer-events: none; }
.sil-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sil-title { font-size: 8px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); }
.sil-toggle { display: flex; gap: 4px; }
.sil-toggle-btn { font-size: 8px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 10px; border-radius: 3px; border: 1px solid var(--border-hi); background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.2s; }
.sil-toggle-btn.active { border-color: var(--gold-dim); color: var(--gold); background: var(--gold-glow); }
.sil-legend { display: flex; gap: 12px; margin-top: 8px; justify-content: center; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--text-dim); }
.legend-dot { width: 5px; height: 5px; border-radius: 50%; }

.muscle-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.muscle-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 12px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
.muscle-card:hover { border-color: var(--border-glow); }
.muscle-card.selected { border-width: 1px; }
.muscle-card-top-bar { position: absolute; top: 0; left: 0; right: 0; height: 1px; }
.muscle-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.muscle-card-name { font-size: 8px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }

.detail-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 10px; }
.detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 8px; }
.detail-name { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 0.05em; line-height: 1; }
.detail-stats { display: grid; grid-template-columns: 1fr 1px 1fr 1px 1fr; background: var(--border); border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
.detail-stat-div { background: var(--border); }
.detail-stat { background: var(--bg-card); padding: 10px 8px; text-align: center; }
.detail-stat-label { font-size: 7px; font-weight: 700; letter-spacing: 0.18em; color: var(--text-faint); text-transform: uppercase; margin-bottom: 5px; }
.detail-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }

/* ── Toast ── */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--bg-hi); border: 1px solid var(--border-hi); color: var(--text); padding: 9px 18px; border-radius: 4px; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; z-index: 200; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.6); animation: toast-up 0.2s ease; pointer-events: none; }
@keyframes toast-up { from { opacity: 0; transform: translateX(-50%) translateY(6px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* ── Rank-up overlay ── */
.rankup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.rankup-overlay.visible { opacity: 1; pointer-events: all; }
.rankup-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 0.4em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
.rankup-muscle { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 0.06em; color: var(--gold); animation: pop-in 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
.rankup-new { font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 14px; color: var(--text-dim); }
.rankup-tap { font-size: 9px; color: var(--text-faint); letter-spacing: 0.14em; margin-top: 28px; animation: blink 1.5s ease infinite; }
@keyframes pop-in { 0% { transform: scale(0.3); opacity: 0; } 70% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }
@keyframes blink { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }
.rankup-particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.particle { position: absolute; border-radius: 50%; animation: fly-up 1.5s ease forwards; }
@keyframes fly-up { 0% { transform: translateY(100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; } }

/* Streak icon CSS — monochrome */
.streak-ico { width: 6px; height: 6px; margin-bottom: 12px; border-radius: 50%; background: var(--border-glow); flex-shrink: 0; }
.fire-ico  { }
.mind-ico  { }
.sleep-ico { }
.quest-ico { }

</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="wordmark">GRIND</div>
    <button class="sync-btn" id="syncBtn" onclick="refresh()">↺ Sync</button>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('home',this)"><span class="nav-icon"></span><span class="nav-label">Home</span></button>
    <button class="nav-btn" onclick="switchTab('tasks',this)"><span class="nav-icon">≡</span><span class="nav-label">Tasks</span></button>
    <button class="nav-btn" onclick="switchTab('stats',this)"><span class="nav-icon"></span><span class="nav-label">Stats</span></button>
  </div>
  <div class="scroll">
    <div id="error-bar" class="error-bar" style="display:none"></div>
    <div id="tab-home" class="tab-panel active"></div>
    <div id="tab-tasks" class="tab-panel" style="display:none"></div>
    <div id="tab-stats" class="tab-panel" style="display:none"></div>
  </div>
</div>
<div class="rankup-overlay" id="rankupOverlay" onclick="closeRankup()">
  <div class="rankup-particles" id="rankupParticles"></div>
  <div class="rankup-eyebrow">RANK UP</div>
  <div class="rankup-muscle" id="rankupMuscle"></div>
  <div id="rankupBadge" style="margin-top:18px"></div>
  <div class="rankup-new" id="rankupNew"></div>
  <div class="rankup-tap">tap to continue</div>
</div>

<script>
const PROXY='/api/notion';
const DB={
  stats:    '34163a0b4e7c81abb22ae7e6bccdf2c2',
  rivals:   'f925bdca42f3428fa6f2c61594ae512a',
  tasks:    '34163a0b4e7c81a5a8aefb94b96a6b36',
  templates:'34163a0b4e7c81a08eefdcd464d0a5a6',
  dailyLog: '35063a0b4e7c80c9889cf67fa1166d90',
  streaks:  '35163a0b4e7c800d8caef234df927236',
};

/* 
   RANK SYSTEM
    */
const TIER_NAMES=['Bronze','Silver','Gold','Platinum','Diamond','Champion','Titan','Olympian'];
const TIER_COLORS={
  Bronze:'#cd7f32',Silver:'#a8a8a8',Gold:'#d4a800',
  Platinum:'#3ab8b8',Diamond:'#9040d0',Champion:'#2860d0',
  Titan:'#c82020',Olympian:'#d08000'
};
const TIER_GLOW={
  Bronze:'rgba(205,127,50,0.5)',Silver:'rgba(168,168,168,0.4)',Gold:'rgba(212,168,0,0.55)',
  Platinum:'rgba(58,184,184,0.5)',Diamond:'rgba(144,64,208,0.55)',Champion:'rgba(40,96,208,0.5)',
  Titan:'rgba(200,32,32,0.55)',Olympian:'rgba(208,128,0,0.55)'
};
const ROMANS=['I','II','III'];
const TIER_XP=[[0,50,120],[220,360,550],[800,1100,1500],[2000,2700,3600],[4800,6300,8100],[10200,12600,15300],[18300,21600,25200],[29100,33300,38000]];
const ALL_RANKS=[];
TIER_NAMES.forEach((name,ti)=>TIER_XP[ti].forEach((min,ri)=>ALL_RANKS.push({name,roman:ROMANS[ri],color:TIER_COLORS[name],glow:TIER_GLOW[name],min,full:`${name} ${ROMANS[ri]}`})));

function getRankFromXP(xp){
  let r=ALL_RANKS[0],next=ALL_RANKS[1];
  for(let i=ALL_RANKS.length-1;i>=0;i--){if(xp>=ALL_RANKS[i].min){r=ALL_RANKS[i];next=ALL_RANKS[i+1]??null;break;}}
  const pct=next?Math.min(((xp-r.min)/(next.min-r.min))*100,100):100;
  return{rank:r,next,pct};
}

function parseRankStr(str){
  if(!str)return null;
  const up=str.toUpperCase().replace(/[^A-Z\s]/g,'').trim();
  for(const name of TIER_NAMES){
    if(up.includes(name.toUpperCase())){
      for(const roman of['III','II','I']){if(up.includes(roman))return ALL_RANKS.find(r=>r.name===name&&r.roman===roman)??null;}

}

function badgeSVG(rankObj, size=40){
  if(!rankObj) rankObj=ALL_RANKS[0];
  const {name, roman} = rankObj;
  const imgSrc = BADGE_IMGS[name] ?? '';

  // All badges are square images on black bg
  // Numeral sits at ~78% height — below the main emblem, above the bottom tip
  // Dark pill background ensures readability on any badge colour
  const w   = size;
  const h   = size;
  const cx  = w / 2;
  const numY = h * 0.82;

  // Pill dimensions
  const pillW = Math.max(22, size * 0.42);
  const pillH = Math.max(11, size * 0.18);
  const pillR = pillH / 2;
  const fontSize = Math.max(8, Math.round(size * 0.17));

  // Unique filter id per badge instance
  const uid = name + roman + Math.round(size);

  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"
    xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
    <defs>
      <filter id="ts${uid}">
        <feDropShadow dx="0" dy="0.5" stdDeviation="1.5"
          flood-color="rgba(0,0,0,1)" flood-opacity="1"/>
      </filter>
    </defs>

    <!-- Badge image -->
    <image href="${imgSrc}" x="0" y="0" width="${w}" height="${h}"
      preserveAspectRatio="xMidYMid meet"/>

    <!-- Numeral pill background -->
    <rect
      x="${(cx - pillW/2).toFixed(1)}"
      y="${(numY - pillH/2).toFixed(1)}"
      width="${pillW.toFixed(1)}"
      height="${pillH.toFixed(1)}"
      rx="${pillR.toFixed(1)}"
      fill="rgba(0,0,0,0.72)"
      stroke="rgba(255,255,255,0.12)"
      stroke-width="0.6"/>

    <!-- Roman numeral -->
    <text
      x="${cx.toFixed(1)}"
      y="${(numY + fontSize*0.08).toFixed(1)}"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="'Bebas Neue',sans-serif"
      font-size="${fontSize}"
      font-weight="700"
      letter-spacing="2"
      fill="rgba(255,255,255,0.95)"
      filter="url(#ts${uid})"
    >${roman}</text>
  </svg>`;
}

function badgeHTML(rankObj,size=56){
  return `<div class="badge-wrap">${badgeSVG(rankObj,size)}</div>`;
}

let silView='front';

function buildSilhouette(bodyStats){
  const statMap={};
  bodyStats.forEach(s=>{ statMap[s.name.toLowerCase()]=s; });

  function getLevel(name){
    const s=statMap[name.toLowerCase()];
    if(!s) return 3;
    const d=s.daysInactive;
    if(d===null||d===undefined) return 3;
    if(d===0) return 0; if(d<=5) return 1; if(d<=14) return 2; return 3;
  }
  function rankColor(name){
    const s=statMap[name.toLowerCase()]; if(!s) return null;
    const r=parseRankStr(s.rankStr); return r?r.color:getRankFromXP(s.finalXP).rank.color;
  }
  function sid(name){ return statMap[name.toLowerCase()]?.id??''; }
  function getRoman(name){
    const s=statMap[name.toLowerCase()]; if(!s) return '';
    const r=parseRankStr(s.rankStr)??getRankFromXP(s.finalXP??0).rank; return r.roman;
  }

  const frontMuscles=['Chest','Core','Shoulder','Biceps','Triceps','Forearms','Legs','Plyometrics','Cardio'];
  const backMuscles =['Back','Shoulder','Triceps','Biceps','Forearms','Legs','Plyometrics'];
  const muscles = silView==='front' ? frontMuscles : backMuscles;
  const VB = silView==='front' ? '0 0 306 612' : '306 0 306 612';

  // Build rank-coloured muscle overlay layers
  const maskLayers = muscles.filter((n,i,a)=>a.indexOf(n)===i).map(name=>{
    const level=getLevel(name), col=rankColor(name), id=sid(name), sel=selectedMuscle===id;
    const src=MASK_IMGS[name]??'';
    if(!src) return '';
    if(level===3&&!sel) return `<image href="${src}" x="0" y="0" width="612" height="612"
      style="opacity:0.05;mix-blend-mode:screen;cursor:pointer;" onclick="selectMuscle('${id}','${name}')"/>`;
    const hex=(col??'#888888').replace('#','');
    const R=(parseInt(hex.slice(0,2),16)/255).toFixed(3);
    const G=(parseInt(hex.slice(2,4),16)/255).toFixed(3);
    const B=(parseInt(hex.slice(4,6),16)/255).toFixed(3);
    const largeMuscle=['Shoulder','Back','Chest','Core','Legs'].includes(name);
    const op=largeMuscle
      ?(sel?0.55:level===0?0.42:level===1?0.28:level===2?0.12:0.03)
      :(sel?0.82:level===0?0.72:level===1?0.52:level===2?0.22:0.04);
    const fid=`cf${name.slice(0,3)}${sel?1:level}`;
    return `<g onclick="selectMuscle('${id}','${name}')" style="cursor:pointer;">
      <defs><filter id="${fid}">
        <feColorMatrix type="matrix" values="${R} 0 0 0 0 ${G} 0 0 0 0 ${B} 0 0 0 0 0 0 0 ${op} 0"/>
        <feComponentTransfer><feFuncRGB type="linear" slope="0.85"/></feComponentTransfer>
        ${sel?`<feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>`:''  }
      </filter></defs>
      <image href="${src}" x="0" y="0" width="612" height="612" filter="url(#${fid})"/>
    </g>`;
  }).join('');

  // Hotspot positions in full image space (612x612)
  const FC=153,BC=459;
  // Hotspot positions tuned to mask white pixel centers
  // Shoulders mask: rows 98-173, cols 90-259 (front figure cols 90-190 left, 200-259 right)
  // Front figure x:70-305, center FC=185. Back figure x:310-545, center BC=430
  const HP={
    front:{
      Chest:       {x:FC,     y:230},  // centre pecs
      Core:        {x:FC,     y:345},  // abs centre
      Cardio:      {x:FC-50,  y:210},  // upper left chest
      Shoulder:    {x:FC+78,  y:155},  // right deltoid
      Biceps:      {x:FC+88,  y:258},  // right bicep
      Triceps:     {x:FC+96,  y:282},  // right tricep
      Forearms:    {x:FC+94,  y:335},  // right forearm
      Legs:        {x:FC+35,  y:445},  // right quad
      Plyometrics: {x:FC+30,  y:535},  // right calf
    },
    back:{
      Back:        {x:BC,     y:225},
      Shoulder:    {x:BC+75,  y:158},
      Triceps:     {x:BC+90,  y:258},
      Biceps:      {x:BC+98,  y:282},
      Forearms:    {x:BC+94,  y:335},
      Legs:        {x:BC+35,  y:445},
      Plyometrics: {x:BC+30,  y:535},
    },
  };
  const posMap=HP[silView];

  const hotspots=muscles.filter((n,i,a)=>a.indexOf(n)===i).map(name=>{
    const pos=posMap[name]; if(!pos) return '';
    const level=getLevel(name),col=rankColor(name)??'#2a2a3a',id=sid(name),sel=selectedMuscle===id;
    const di=statMap[name.toLowerCase()]?.daysInactive;
    const diLabel=di===0?'NOW':di!=null?di+'d':'—';
    const glow=level<=1||sel;
    const borderCol=sel?col:level===0?col:level===1?col+'bb':level===2?col+'44':'#1e1e28';
    const fillCol=sel?col+'44':level===0?col+'22':level===1?col+'11':'rgba(10,10,14,0.85)';
    const textCol=glow?col:'#2a2a3a';
    // Adjust x for viewBox crop
    const lx=silView==='front'?pos.x:pos.x-306;
    const ly=pos.y;
    return `<g onclick="selectMuscle('${id}','${name}')" style="cursor:pointer;">
      ${glow?`<circle cx="${lx}" cy="${ly}" r="22" fill="${col}" opacity="0.1"/>`:''}
      <circle cx="${lx}" cy="${ly}" r="15" fill="${fillCol}" stroke="${borderCol}" stroke-width="${sel?2.5:glow?2:1.2}" ${glow?`filter="url(#glow)"`:''}/>
      <text x="${lx}" y="${ly-2}" text-anchor="middle" dominant-baseline="middle" font-family="'Bebas Neue',sans-serif" font-size="8" fill="${textCol}">${name.slice(0,4).toUpperCase()}</text>
      <text x="${lx}" y="${ly+6}" text-anchor="middle" dominant-baseline="middle" font-family="'Inter',sans-serif" font-size="5.5" font-weight="700" fill="${glow?col+'cc':'#1e1e28'}">${diLabel}</text>
    </g>`;
  }).join('');

  return `<div style="width:100%;max-width:220px;margin:0 auto;">
    <svg viewBox="${VB}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">
      <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <image href="${ANATOMY_IMG}" x="0" y="0" width="612" height="612"
        preserveAspectRatio="xMidYMid meet" style="opacity:0.9;"/>
      ${maskLayers}
      ${hotspots}
    </svg>
  </div>`;
}

async function nFetch(path,method='GET',body){
  const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path,method,body})});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error??`Error ${res.status}`);}
  return res.json();
}

const nCreate=(dbId,props)=>nFetch('/pages','POST',{parent:{database_id:dbId},properties:props});

const g={
  title:v=>v?.title?.[0]?.plain_text??'',
  text:v=>v?.rich_text?.[0]?.plain_text??'',
  select:v=>v?.select?.name??null,
  checkbox:v=>v?.checkbox??false,
  date:v=>v?.date?.start??null,
  formula:v=>{const f=v?.formula;if(!f)return null;return f.number??f.string??f.boolean??null;},
  rollup:v=>{const r=v?.rollup;if(!r)return null;if(r.type==='number')return r.number;if(r.type==='array'){const f=r.array?.[0];if(!f)return null;if(f.type==='formula'){const ff=f.formula;return ff.number??ff.string??null;}if(f.type==='number')return f.number;}return null;},
  rollupStr:v=>{const r=v?.rollup;if(!r)return null;if(r.type==='array'){const f=r.array?.[0];if(!f)return null;if(f.type==='formula'&&f.formula?.type==='string')return f.formula.string;if(f.type==='title')return f.title?.[0]?.plain_text??null;}return null;},
  num:v=>typeof v?.number==="number"?v.number:null
};

const toStat=p=>{const q=p.properties;return{id:p.id,name:g.title(q.Name),finalXP:g.formula(q['Final XP'])??0,rankStr:g.formula(q.Rank)??'',rivalGap:g.rollup(q['Rival Gap']),rivalXP:g.rollup(q['Rival XP'])??0,lastTrained:g.rollup(q['Last day trained']),daysInactive:g.formula(q['Days inactive'])??g.num(q['Days inactive']),cat:g.select(q.Cat)};};
const toRival=p=>{const q=p.properties;return{id:p.id,bodyPart:g.select(q['Body Part']),totalXP:g.formula(q['Total XP'])??0,gapNumber:g.formula(q['Gap in numbers'])??0,myCurrentXP:g.rollup(q['My current XP'])??0};};
const toTask=p=>{const q=p.properties;return{id:p.id,name:g.title(q.Task),cat:g.select(q.Cat),difficulty:g.select(q.Difficulty),status:g.checkbox(q.Status),missed:g.checkbox(q['Missed check1']),dueDate:g.date(q['Due Date']),isQuest:g.formula(q['Is Quest'])??false};};
const toTemplate=p=>{const q=p.properties;return{id:p.id,name:g.title(q.Name),cat:g.select(q.Cat),type:g.select(q.Type)};};


function setError(msg){const el=document.getElementById('error-bar');if(msg){el.textContent=msg;el.style.display='block';}else el.style.display='none';}
function showToast(msg,ms=2500){document.querySelectorAll('.toast').forEach(t=>t.remove());const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),ms);}
function setSyncBusy(b){const btn=document.getElementById('syncBtn');btn.disabled=b;btn.textContent=b?'…':'↺ Sync';}

function checkRankUps(ns){ns.forEach(s=>{const old=prevRanks[s.id];if(old&&old!==s.rankStr&&s.rankStr){const r=parseRankStr(s.rankStr);if(r)triggerRankUp(s.name,r);}prevRanks[s.id]=s.rankStr;});}
function triggerRankUp(name,ro){
  document.getElementById('rankupMuscle').textContent=name.toUpperCase();
  document.getElementById('rankupNew').textContent=ro.full;
  document.getElementById('rankupBadge').innerHTML=badgeHTML(ro,120);
  const c=document.getElementById('rankupParticles');c.innerHTML='';
  for(let i=0;i<35;i++){const p=document.createElement('div');p.className='particle';const sz=3+Math.random()*5;p.style.cssText=`left:${Math.random()*100}%;bottom:0;width:${sz}px;height:${sz}px;background:${ro.color};animation-delay:${Math.random()*0.6}s;animation-duration:${1+Math.random()}s;`;c.appendChild(p);}
  document.getElementById('rankupOverlay').classList.add('visible');
}
function closeRankup(){document.getElementById('rankupOverlay').classList.remove('visible');}

async function loadStats(){try{const p=await nQuery(DB.stats);const ns=p.map(toStat);checkRankUps(ns);state.stats=ns;}catch(e){setError('Stats: '+e.message);}}
async function loadRivals(){try{const p=await nQuery(DB.rivals);state.rivals=p.map(toRival);}catch(e){console.error(e);}}
async function loadTasks(){
  try{
    const today=new Date().toISOString().split('T')[0];
    const p=await nQuery(DB.tasks,{and:[
      {property:'Status',checkbox:{equals:false}},
      {property:'Missed check1',checkbox:{equals:false}},
      {or:[{property:'Due Date',date:{on_or_before:today}},{property:'Due Date',date:{is_empty:true}}]},
    ]},[{property:'Due Date',direction:'ascending'}]);
    state.tasks=p.map(toTask);
  }catch(e){setError('Tasks: '+e.message);}
}
async function loadTemplates(){try{const p=await nQuery(DB.templates);state.templates=p.map(toTemplate);}catch(e){console.error(e);}}
async function loadStreaks(){
  try{
    // Streaks DB has single "Shite" row with all computed streak formulas
    const pages=await nQuery(DB.streaks);
    if(pages.length){
      const q=pages[0].properties;
      function parseStreak(val){
        if(typeof val==='number') return val;
        if(!val) return 0;
        // Extract number from strings like "Workout Streak - ❄ 14 days"
        const m=String(val).match(/\d+/);
        return m?parseInt(m[0]):0;
      }
      state.streaks={
        workout: parseStreak(g.formula(q['Work streak'])),
        mind:    parseStreak(g.formula(q['Mind streak'])),
        sleep:   parseStreak(g.formula(q['Sleep streak'])),
        quest:   parseStreak(g.formula(q['Quest streak'])),
      };
    }
  }catch(e){setError('Streaks: '+e.message);}
}

async function refresh(){
  setError(null);setSyncBusy(true);
  if(currentTab==='home'){await Promise.all([loadStreaks(),loadStats(),loadRivals()]);renderHome();}
  if(currentTab==='tasks'){await Promise.all([loadTasks(),loadTemplates()]);renderTasks();}
  if(currentTab==='stats'){await Promise.all([loadStats(),loadRivals()]);renderStats();}
  setSyncBusy(false);
}
function switchTab(tab,btn){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>{p.style.display='none';p.classList.remove('active');});
  btn.classList.add('active');
  const panel=document.getElementById('tab-'+tab);panel.style.display='block';panel.classList.add('active');
  currentTab=tab;refresh();
}

const DIFF_ORDER=['Maintenance','Normal','Heavy','Daily','Important'];
const CATS=['Body','Mind','Life','German'];
const CAT_COLOR={Body:'#6a2020',Mind:'#1a3060',Life:'#1a4a28',German:'#5a4010'};
const CAT_TEXT={Body:'#c04040',Mind:'#4a80d8',Life:'#3ab36a',German:'#c09030'};

function renderTasks(){
  const today=new Date();today.setHours(0,0,0,0);
  const tGroups={};
  state.templates.forEach(t=>{const c=t.cat??'Other';if(!tGroups[c])tGroups[c]=[];tGroups[c].push(t);});

  let html=`<div class="action-row">
    <button class="action-btn gold-btn" onclick="addDailyLog()"><span class="action-btn-icon"></span>Daily Log</button>
    <button class="action-btn" onclick="addWorkout()"><span class="action-btn-icon"></span>Workout</button>
  </div>`;

  // Quick add
  const tEntries=Object.entries(tGroups).filter(([,ts])=>ts.length);
  if(tEntries.length){
    html+=`<div class="section-label">Quick Add</div>`;
    tEntries.forEach(([cat,ts])=>{
      const col=CAT_TEXT[cat]??'var(--text-dim)';
      const bg=CAT_COLOR[cat]??'var(--border)';
      html+=`<div class="tmpl-section"><div class="tmpl-title"><div class="tmpl-dot" style="background:${col}"></div>${cat}</div><div class="tmpl-pills">${ts.map(t=>`<div class="tmpl-pill" onclick="quickAdd('${t.id}','${t.name.replace(/'/g,"\\'")}','${t.cat??''}','${t.type??''}')">${t.name}</div>`).join('')}</div></div>`;
    });
  }

  // Task list grouped by date → category
  const dGroups={};
  state.tasks.forEach(t=>{
    let label='No Date';
    if(t.dueDate){const d=new Date(t.dueDate);d.setHours(0,0,0,0);const diff=Math.round((today-d)/(1000*60*60*24));label=diff===0?'Today':diff===1?'Yesterday':diff>1?`${diff} Days Ago`:'Upcoming';}
    if(!dGroups[label])dGroups[label]=[];
    dGroups[label].push(t);
  });
  const dOrder=['Today','Yesterday'];
  const dSorted=Object.keys(dGroups).sort((a,b)=>{const ai=dOrder.indexOf(a),bi=dOrder.indexOf(b);if(ai>-1&&bi>-1)return ai-bi;if(ai>-1)return -1;if(bi>-1)return 1;const an=parseInt(a),bn=parseInt(b);return isNaN(an)||isNaN(bn)?0:bn-an;});

  html+=`<div class="section-label">Tasks</div>`;
  if(!state.tasks.length){html+='<div class="empty">No pending tasks</div>';}
  else{
    dSorted.forEach(dl=>{
      html+=`<div class="date-hdr">${dl}</div>`;
      CATS.forEach(cat=>{
        const ct=dGroups[dl].filter(t=>t.cat===cat);
        if(!ct.length)return;
        html+=`<div class="cat-sub"><div class="cat-dot" style="background:${CAT_TEXT[cat]}"></div>${cat}</div>`;
        ct.forEach(t=>{html+=taskHTML(t,today);});
      });
      const ot=dGroups[dl].filter(t=>!t.cat||!CATS.includes(t.cat));
      if(ot.length){html+=`<div class="cat-sub"><div class="cat-dot" style="background:var(--text-dim)"></div>Other</div>`;ot.forEach(t=>{html+=taskHTML(t,today);});}
    });
  }
  document.getElementById('tab-tasks').innerHTML=html;
}

function taskHTML(task,today){
  const overdue=task.dueDate&&new Date(task.dueDate)<today;
  const dueStr=task.dueDate?new Date(task.dueDate).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):null;
  const diff=task.difficulty;
  const isQ=task.isQuest===true||task.isQuest===' QUEST';
  return `<div class="task-item ${task.status?'done':''} ${isQ?'is-quest':''}" id="task-${task.id}">
    <div class="task-cb" onclick="toggleTask('${task.id}',${task.status})">${task.status?'':''}</div>
    <div class="task-body">
      <div class="task-name">${task.name||'Unnamed'}</div>
      <div class="task-tags">
        ${isQ?'<span class="quest-tag"> QUEST</span>':''}
        ${diff?`<span class="diff-pill diff-${diff}" onclick="cycleDiff(event,'${task.id}','${diff}')">${diff}</span>`:''}
        ${dueStr?`<span class="task-due ${overdue?'overdue':''}">${overdue?' ':''}${dueStr}</span>`:''}
      </div>
    </div>
  </div>`;
}

  });
  html+='</div>';

/* 
   ACTIONS
    */
async function toggleTask(taskId,current){
  const next=!current;
  state.tasks=state.tasks.map(t=>t.id===taskId?{...t,status:next}:t);renderTasks();
  try{
    await nPatch(taskId,{Status:{checkbox:next}});
    showToast(next?' Done':'Reopened');
    if(next)setTimeout(()=>{state.tasks=state.tasks.filter(t=>t.id!==taskId);renderTasks();},700);
  }catch(e){state.tasks=state.tasks.map(t=>t.id===taskId?{...t,status:current}:t);renderTasks();showToast('Update failed');}
}

async function cycleDiff(e,taskId,cur){
  e.stopPropagation();
  const next=DIFF_ORDER[(DIFF_ORDER.indexOf(cur)+1)%DIFF_ORDER.length];
  state.tasks=state.tasks.map(t=>t.id===taskId?{...t,difficulty:next}:t);renderTasks();
  try{await nPatch(taskId,{Difficulty:{select:{name:next}}});showToast(`→ ${next}`);}
  catch(e){state.tasks=state.tasks.map(t=>t.id===taskId?{...t,difficulty:cur}:t);renderTasks();showToast('Update failed');}
}

async function quickAdd(tid,name,cat,type){
  const today=new Date().toISOString().split('T')[0];
  try{
    await nCreate(DB.tasks,{Task:{title:[{text:{content:name}}]},...(cat?{Cat:{select:{name:cat}}}:{}),
      ...(type==='Daily'?{Difficulty:{select:{name:'Daily'}}}:type==='Weekly'?{Difficulty:{select:{name:'Heavy'}}}:{}),
      Status:{checkbox:false},'Due Date':{date:{start:today}}});
    showToast(` ${name}`);await loadTasks();renderTasks();
  }catch(e){showToast('Failed');}
}

/* 
   DAILY LOG BUTTON
   Mimics Notion automation:
   1. Create Daily Log entry for today
   2. Find today's tasks (Due Date = today)
   3. Set their "Daily log" relation to the new entry
    */
async function addDailyLog(){
  const btn=document.querySelector('.action-btn.gold-btn');
  if(btn){btn.disabled=true;btn.querySelector('.action-btn-icon').textContent='…';}
  const today=new Date().toISOString().split('T')[0];
  const todayLabel=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});

  // The 4 daily tasks to create
  const DAILY_TASKS=[
    {name:'Meditate for 10 mins', cat:'Life', diff:'Daily'},
    {name:'Journal',               cat:'Life', diff:'Daily'},
    {name:'Clean Room',            cat:'Life', diff:'Daily'},
    {name:'Read 30 mins',          cat:'Mind', diff:'Daily'},
  ];

  try{
    // 1. Create Daily Log page
    const logPage=await nCreate(DB.dailyLog,{
      'Log day':{title:[{text:{content:todayLabel}}]},
      'Date':{date:{start:today}},
    });
    const logId=logPage.id;

    // 2. Create the 4 daily tasks with today's date
    const newTaskPages=await Promise.all(DAILY_TASKS.map(t=>nCreate(DB.tasks,{
      Task:      {title:[{text:{content:t.name}}]},
      Cat:       {select:{name:t.cat}},
      Difficulty:{select:{name:t.diff}},
      Status:    {checkbox:false},
      'Due Date':{date:{start:today}},
    })));

    // 3. Query any existing tasks due today (not missed, not done)
    const existingTasks=await nQuery(DB.tasks,{and:[
      {property:'Status',   checkbox:{equals:false}},
      {property:'Missed check1',checkbox:{equals:false}},
      {property:'Due Date', date:{equals:today}},
    ]});

    // 4. Combine new + existing task IDs, link all to the daily log
    const allIds=[
      ...newTaskPages.map(p=>p.id),
      ...existingTasks.map(t=>t.id),
    ];
    const uniqueIds=[...new Set(allIds)];

    await Promise.all(uniqueIds.map(id=>nPatch(id,{
      'Daily log':{relation:[{id:logId}]},
    })));

    showToast(`Log created · ${uniqueIds.length} tasks linked`,3500);
    await loadTasks();renderTasks();
  }catch(e){
    showToast('Failed: '+e.message);
  }
  if(btn){btn.disabled=false;btn.querySelector('.action-btn-icon').textContent='';}
}

    { day:6, tasks:[{name:'Cardio workout',    diff:'Normal'     ,cat:'Body'},
                    {name:'Legs workout',      diff:'Heavy'      ,cat:'Body'}] },
    { day:0, tasks:[{name:'Rest day',          diff:'Maintenance',cat:'Body'}] },
  ];

  // Find Monday of current week
  const now = new Date();
  const day = now.getDay(); // 0=Sun,1=Mon,...,6=Sat
  const mondayOffset = day === 0 ? -6 : 1 - day; // days to subtract to get to Monday
  const monday = new Date(now);
  monday.setDate(now.getDate() + mondayOffset);
  monday.setHours(0,0,0,0);

  const toISO = d => d.toISOString().split('T')[0];

  try {
    const creates = [];
    SCHEDULE.forEach(({day: dow, tasks}) => {
      // Calculate date for this day of week from Monday
      const offset = dow === 0 ? 6 : dow - 1; // Mon=0offset, Tue=1, ... Sun=6
      const date = new Date(monday);
      date.setDate(monday.getDate() + offset);
      const dateStr = toISO(date);
      tasks.forEach(t => {
        creates.push(nCreate(DB.tasks, {
          Task:       { title:[{text:{content:t.name}}] },
          Cat:        { select:{name:t.cat} },
          Difficulty: { select:{name:t.diff} },
          Status:     { checkbox:false },
          'Due Date': { date:{start:dateStr} },
        }));
      });
    });
    await Promise.all(creates);
    showToast(`Week added — ${creates.length} tasks`, 3000);
    await loadTasks(); renderTasks();
  } catch(e) { showToast('Failed: '+e.message); }
}

// Init
document.querySelectorAll('.tab-panel').forEach((p,i)=>{if(i>0)p.style.display='none';});
refresh();
</script>
</body>
</html>
