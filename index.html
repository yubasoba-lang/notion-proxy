<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c14">
<title>Hunter System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --bg-card: #0d1220;
    --bg-mid: #111827;
    --border: #1e2d45;
    --border-hi: #2a4a6e;
    --blue: #3b82f6;
    --purple: #7c3aed;
    --purple-hi: #8b5cf6;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-faint: #2d3f55;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  #app { max-width: 430px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 1; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: rgba(8,12,20,0.97);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }
  .header-title {
    font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header-sub { font-family: 'Rajdhani', sans-serif; font-size: 10px; color: var(--text-dim); letter-spacing: 0.05em; margin-top: 1px; }
  .sync-btn {
    background: transparent; border: 1px solid var(--border-hi);
    color: var(--text-dim); font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    padding: 6px 14px; cursor: pointer; text-transform: uppercase;
    border-radius: 4px; transition: all 0.2s;
  }
  .sync-btn:hover { color: var(--blue); border-color: var(--blue); }
  .sync-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Nav */
  .nav {
    display: grid; grid-template-columns: repeat(4, 1fr);
    background: rgba(8,12,20,0.98);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 4px 8px; background: none; border: none; cursor: pointer;
    color: var(--text-dim); transition: all 0.2s; position: relative;
    font-family: 'Rajdhani', sans-serif;
  }
  .nav-btn.active { color: var(--blue); }
  .nav-btn.active::after {
    content: ''; position: absolute; bottom: 0; left: 15%; right: 15%;
    height: 2px; background: linear-gradient(90deg, var(--blue), var(--purple));
    border-radius: 2px 2px 0 0; box-shadow: 0 0 8px var(--blue);
  }
  .nav-icon { font-size: 16px; line-height: 1; }
  .nav-label { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Scroll */
  .scroll { flex: 1; overflow-y: auto; padding: 16px 14px 100px; -webkit-overflow-scrolling: touch; }

  /* Tab panels */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Loader */
  .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 70px 20px; gap: 14px; }
  .loader-ring { width: 48px; height: 48px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; }

  /* Error */
  .error-bar { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 8px; color: #f87171; padding: 12px 14px; font-size: 12px; font-family: 'Rajdhani', sans-serif; font-weight: 500; margin-bottom: 12px; line-height: 1.5; }

  /* Section title */
  .section-title {
    font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim);
    display: flex; align-items: center; gap: 10px; margin: 20px 0 12px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }

  /* Rank hero */
  .rank-hero {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 28px 20px 24px; display: flex; flex-direction: column; align-items: center;
    position: relative; overflow: hidden; margin-bottom: 12px;
  }
  .rank-hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .rank-badge-wrap { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
  .rank-ring { position: absolute; inset: 0; border-radius: 50%; border: 1px solid; opacity: 0.3; animation: ring-pulse 3s ease-in-out infinite; }
  .rank-ring-2 { position: absolute; inset: 8px; border-radius: 50%; border: 1px solid; opacity: 0.15; }
  @keyframes ring-pulse { 0%,100% { transform:scale(1); opacity:0.3; } 50% { transform:scale(1.04); opacity:0.5; } }
  .rank-inner { width: 84px; height: 84px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; background: var(--bg); position: relative; z-index: 1; }
  .rank-letter { font-family: 'Orbitron', monospace; font-size: 36px; font-weight: 900; line-height: 1; }
  .rank-label { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
  .rank-xp { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 700; }
  .rank-xp-unit { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.1em; margin-left: 4px; }
  .xp-bar-wrap { width: 100%; margin-top: 16px; }
  .xp-bar-meta { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .xp-bar-text { font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; }
  .xp-bar-track { height: 6px; background: var(--bg-mid); border-radius: 3px; overflow: hidden; }
  .xp-bar-fill { height: 100%; border-radius: 3px; transition: width 1.2s cubic-bezier(0.4,0,0.2,1); position: relative; overflow: hidden; }
  .xp-bar-fill::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent); animation: shimmer 2s linear infinite; }
  @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .stat-mini { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 12px; position: relative; }
  .stat-mini::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--border-hi), transparent); }
  .stat-mini-label { font-family: 'Rajdhani', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
  .stat-mini-value { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 600; line-height: 1; }
  .stat-mini-sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-family: 'Rajdhani', sans-serif; font-weight: 500; }

  /* Rival dash */
  .rival-dash { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; position: relative; overflow: hidden; }
  .rival-dash::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 100% 0%, rgba(124,58,237,0.06) 0%, transparent 60%); pointer-events: none; }
  .rival-dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .rival-dash-name { font-family: 'Orbitron', monospace; font-size: 15px; font-weight: 700; background: linear-gradient(135deg,#7c3aed,#3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .pill { font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; padding: 3px 10px; border-radius: 20px; border: 1px solid; text-transform: uppercase; }
  .pill-ahead { color: #4ade80; border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.08); }
  .pill-behind { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); }
  .pill-tied { color: var(--blue); border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.08); }
  .rival-xp-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; }
  .rival-xp-label { font-family: 'Rajdhani', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
  .rival-xp-val { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 600; }
  .rival-vs { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; color: var(--text-faint); text-align: center; }
  .rival-gap-row { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-family: 'Rajdhani', sans-serif; font-size: 12px; color: var(--text-dim); display: flex; justify-content: space-between; }
  .rival-gap-val { font-family: 'Orbitron', monospace; font-size: 13px; color: var(--text); }

  /* Tasks */
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 6px; }
  .action-btn {
    background: var(--bg-card); border: 1px solid var(--border-hi); border-radius: 8px;
    color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; padding: 14px 10px; cursor: pointer;
    transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .action-btn:hover { background: var(--bg-mid); border-color: var(--blue); color: var(--blue); }
  .action-btn:active { transform: scale(0.97); }
  .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .action-icon { font-size: 20px; }
  .cat-header {
    font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px; margin: 18px 0 8px;
  }
  .cat-header::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--border), transparent); }
  .cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .task-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 6px; cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .task-item:active { transform: scale(0.99); opacity: 0.8; }
  .task-item.done { opacity: 0.35; }
  .task-item.done .task-name { text-decoration: line-through; color: var(--text-dim); }
  .task-cb { width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--border-hi); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; color: var(--blue); transition: all 0.15s; }
  .task-item.done .task-cb { background: rgba(59,130,246,0.2); border-color: var(--blue); }
  .task-body { flex: 1; min-width: 0; }
  .task-name { font-size: 14px; font-weight: 500; line-height: 1.3; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-tags { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .tag { font-family: 'Rajdhani', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 1px 7px; border-radius: 3px; border: 1px solid; }
  .tag-due { font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 500; color: var(--text-dim); }
  .tag-due.overdue { color: #f87171; }
  .empty { text-align: center; padding: 50px 20px; color: var(--text-faint); font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; }

  /* Stats */
  .body-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .body-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 12px; position: relative; }
  .body-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--border-hi), transparent); }
  .body-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .body-card-name { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; }
  .body-rank { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; }
  .body-xp { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 600; margin-bottom: 8px; line-height: 1; }
  .body-xp-unit { font-size: 9px; font-family: 'Rajdhani', sans-serif; font-weight: 600; color: var(--text-dim); letter-spacing: 0.1em; margin-left: 2px; }
  .body-bar { height: 3px; background: var(--bg-mid); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .body-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
  .body-last { font-size: 10px; color: var(--text-faint); font-family: 'Rajdhani', sans-serif; font-weight: 500; }

  /* Rivals full */
  .rival-full { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 20px 16px; margin-bottom: 12px; position: relative; overflow: hidden; }
  .rival-full::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% -20%, rgba(124,58,237,0.07) 0%, transparent 60%); pointer-events: none; }
  .rival-full-name { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 800; background: linear-gradient(135deg,#7c3aed,#3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
  .rival-personality { font-size: 12px; color: var(--text-dim); font-style: italic; margin-bottom: 16px; }
  .rival-stat-grid { display: grid; grid-template-columns: 1fr 1px 1fr 1px 1fr; background: var(--bg-mid); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
  .rival-stat-div { background: var(--border); }
  .rival-stat-cell { padding: 12px 8px; text-align: center; }
  .rival-stat-label { font-family: 'Rajdhani', sans-serif; font-size: 8px; font-weight: 700; letter-spacing: 0.2em; color: var(--text-faint); text-transform: uppercase; margin-bottom: 5px; }
  .rival-stat-val { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 600; }

  /* Toast */
  .toast {
    position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%);
    background: var(--bg-mid); border: 1px solid var(--border-hi); color: var(--text);
    padding: 10px 20px; border-radius: 6px; font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    z-index: 100; white-space: nowrap; box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    animation: toast-up 0.2s ease; pointer-events: none;
  }
  @keyframes toast-up { from { opacity:0; transform:translateX(-50%) translateY(6px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <div class="header-title">Hunter System</div>
      <div class="header-sub">Level Up · Every Day</div>
    </div>
    <button class="sync-btn" id="syncBtn" onclick="refresh()">↺ Sync</button>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('dashboard', this)">
      <span class="nav-icon">⚡</span>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" onclick="switchTab('tasks', this)">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Tasks</span>
    </button>
    <button class="nav-btn" onclick="switchTab('stats', this)">
      <span class="nav-icon">📈</span>
      <span class="nav-label">Stats</span>
    </button>
    <button class="nav-btn" onclick="switchTab('rivals', this)">
      <span class="nav-icon">⚔️</span>
      <span class="nav-label">Rivals</span>
    </button>
  </div>

  <div class="scroll">
    <div id="error-bar" class="error-bar" style="display:none"></div>
    <div id="tab-dashboard" class="tab-panel active"><div class="loader"><div class="loader-ring"></div><div class="loader-text">Syncing data…</div></div></div>
    <div id="tab-tasks" class="tab-panel"><div class="loader"><div class="loader-ring"></div><div class="loader-text">Loading quests…</div></div></div>
    <div id="tab-stats" class="tab-panel"><div class="loader"><div class="loader-ring"></div><div class="loader-text">Reading stats…</div></div></div>
    <div id="tab-rivals" class="tab-panel"><div class="loader"><div class="loader-ring"></div><div class="loader-text">Loading rivals…</div></div></div>
  </div>
</div>

<script>
const PROXY = '/api/notion';
const DB = {
  stats:     '34163a0b4e7c81abb22ae7e6bccdf2c2',
  rivals:    'f925bdca42f3428fa6f2c61594ae512a',
  tasks:     '34163a0b4e7c81a5a8aefb94b96a6b36',
  templates: '34163a0b4e7c81a08eefdcd464d0a5a6',
};

const RANKS = [
  { name:'E',   min:0,     color:'#9e9e9e', glow:'rgba(158,158,158,0.3)'  },
  { name:'D',   min:100,   color:'#78909c', glow:'rgba(120,144,156,0.3)'  },
  { name:'C',   min:300,   color:'#66bb6a', glow:'rgba(102,187,106,0.35)' },
  { name:'B',   min:700,   color:'#42a5f5', glow:'rgba(66,165,245,0.4)'   },
  { name:'A',   min:1500,  color:'#ab47bc', glow:'rgba(171,71,188,0.4)'   },
  { name:'S',   min:3000,  color:'#7e57c2', glow:'rgba(126,87,194,0.45)'  },
  { name:'SS',  min:6000,  color:'#5c6bc0', glow:'rgba(92,107,192,0.5)'   },
  { name:'SSS', min:12000, color:'#ef5350', glow:'rgba(239,83,80,0.5)'    },
];
const CAT_COLOR = { Body:'#ef5350', Mind:'#42a5f5', Life:'#66bb6a', German:'#ffa726' };
const DIFF_COLOR = { Daily:'#ffa726', Important:'#ab47bc', Heavy:'#ef5350', Normal:'#66bb6a', Maintenance:'#42a5f5' };

function getRank(xp) {
  let r = RANKS[0], next = RANKS[1];
  for (let i = RANKS.length-1; i >= 0; i--) {
    if (xp >= RANKS[i].min) { r = RANKS[i]; next = RANKS[i+1] ?? null; break; }
  }
  const pct = next ? Math.min(((xp - r.min) / (next.min - r.min)) * 100, 100) : 100;
  return { rank: r, next, pct };
}

// State
let state = { stats:[], rivals:[], tasks:[], templates:[], loading:false };
let currentTab = 'dashboard';

async function notionFetch(path, method='GET', body) {
  const res = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, method, body }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error ?? `Error ${res.status}`);
  }
  return res.json();
}

const notionQuery = (dbId, filter, sorts) =>
  notionFetch(`/databases/${dbId}/query`, 'POST', {
    page_size: 100,
    ...(filter ? { filter } : {}),
    ...(sorts  ? { sorts  } : {}),
  }).then(d => d.results ?? []);

const notionPatch = (pageId, props) =>
  notionFetch(`/pages/${pageId}`, 'PATCH', { properties: props });

const notionCreate = (dbId, props) =>
  notionFetch('/pages', 'POST', { parent: { database_id: dbId }, properties: props });

const g = {
  title:    v => v?.title?.[0]?.plain_text    ?? '',
  text:     v => v?.rich_text?.[0]?.plain_text ?? '',
  number:   v => v?.number                    ?? 0,
  select:   v => v?.select?.name              ?? null,
  checkbox: v => v?.checkbox                  ?? false,
  date:     v => v?.date?.start               ?? null,
  formula:  v => { const f = v?.formula; if (!f) return null; return f.number ?? f.string ?? f.boolean ?? null; },
  rollup:   v => { const r = v?.rollup; if (!r) return null; if (r.type==='number') return r.number; if (r.type==='array') { const f=r.array?.[0]; return f?.formula?.number ?? f?.formula?.string ?? f?.number ?? null; } return null; },
};

const toStat = p => ({ id:p.id, name:g.title(p.properties.Name), finalXP:g.formula(p.properties['Final XP'])??0, weeklyGain:g.formula(p.properties['Weekly gain'])??0, lastTrained:g.rollup(p.properties['Last day trained']), cat:g.select(p.properties.Cat), description:g.text(p.properties.Description) });
const toRival = p => ({ id:p.id, name:g.title(p.properties.Name), totalXP:g.formula(p.properties['Total XP'])??0, rank:g.formula(p.properties.Rank)??'', gap:g.formula(p.properties.Gap)??'', myCurrentXP:g.rollup(p.properties['My current XP'])??0, personality:g.text(p.properties.Personality), bodyPart:g.select(p.properties['Body Part']) });
const toTask = p => ({ id:p.id, name:g.title(p.properties.Task), cat:g.select(p.properties.Cat), difficulty:g.select(p.properties.Difficulty), status:g.checkbox(p.properties.Status), dueDate:g.date(p.properties['Due Date']) });
const toTemplate = p => ({ id:p.id, name:g.title(p.properties.Name), cat:g.select(p.properties.Cat), type:g.select(p.properties.Type) });

function setError(msg) {
  const el = document.getElementById('error-bar');
  if (msg) { el.textContent = msg; el.style.display = 'block'; }
  else el.style.display = 'none';
}

function showToast(msg, ms=2500) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), ms);
}

function setSyncBusy(busy) {
  const btn = document.getElementById('syncBtn');
  btn.disabled = busy; btn.textContent = busy ? 'Syncing…' : '↺ Sync';
}

// ── Load functions ──
async function loadStats() {
  try {
    const pages = await notionQuery(DB.stats);
    state.stats = pages.map(toStat);
  } catch(e) { setError('Stats: ' + e.message); }
}

async function loadRivals() {
  try {
    const pages = await notionQuery(DB.rivals);
    state.rivals = pages.map(toRival);
  } catch(e) { setError('Rivals: ' + e.message); }
}

async function loadTasks() {
  try {
    const today = new Date().toISOString().split('T')[0];
    const pages = await notionQuery(DB.tasks, {
      and: [
        { property:'Status', checkbox:{ equals:false } },
        { or:[
          { property:'Due Date', date:{ on_or_before:today } },
          { property:'Due Date', date:{ is_empty:true } },
        ]},
      ],
    }, [{ property:'Due Date', direction:'ascending' }]);
    state.tasks = pages.map(toTask);
  } catch(e) { setError('Tasks: ' + e.message); }
}

async function loadTemplates() {
  try {
    const pages = await notionQuery(DB.templates);
    state.templates = pages.map(toTemplate);
  } catch(e) { console.error(e); }
}

async function refresh() {
  setError(null); setSyncBusy(true);
  if (currentTab === 'dashboard') { await Promise.all([loadStats(), loadRivals()]); renderDashboard(); }
  if (currentTab === 'tasks')     { await Promise.all([loadTasks(), loadTemplates()]); renderTasks(); }
  if (currentTab === 'stats')     { await loadStats(); renderStats(); }
  if (currentTab === 'rivals')    { await loadRivals(); renderRivals(); }
  setSyncBusy(false);
}

// ── Tab switching ──
function switchTab(tab, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  currentTab = tab;
  refresh();
}

// ── Renderers ──
function renderDashboard() {
  const bodyStat = state.stats.find(s => s.cat === 'Body') ?? state.stats[0];
  const rival    = state.rivals[0];
  const xp       = bodyStat?.finalXP ?? 0;
  const weekly   = bodyStat?.weeklyGain ?? 0;
  const { rank, next, pct } = getRank(xp);
  const myXP  = rival?.myCurrentXP ?? xp;
  const rivXP = rival?.totalXP ?? 0;
  const isAhead  = myXP > rivXP;
  const isBehind = myXP < rivXP;
  const pillClass = isAhead ? 'pill-ahead' : isBehind ? 'pill-behind' : 'pill-tied';
  const pillText  = isAhead ? '▲ Ahead'   : isBehind ? '▼ Behind'   : '= Tied';

  document.getElementById('tab-dashboard').innerHTML = `
    <div class="rank-hero">
      <div class="rank-badge-wrap">
        <div class="rank-ring" style="border-color:${rank.color};box-shadow:0 0 20px ${rank.glow}"></div>
        <div class="rank-ring-2" style="border-color:${rank.color}"></div>
        <div class="rank-inner" style="border-color:${rank.color};box-shadow:0 0 16px ${rank.glow}">
          <span class="rank-letter" style="color:${rank.color};filter:drop-shadow(0 0 8px ${rank.color})">${rank.name}</span>
        </div>
      </div>
      <div class="rank-label">Current Rank</div>
      <div><span class="rank-xp" style="color:${rank.color}">${Number(xp).toLocaleString()}</span><span class="rank-xp-unit">XP</span></div>
      <div class="xp-bar-wrap">
        <div class="xp-bar-meta">
          <span class="xp-bar-text">Rank ${rank.name}</span>
          <span class="xp-bar-text">${next ? Math.round(pct)+'% → '+next.name : 'Max Rank'}</span>
        </div>
        <div class="xp-bar-track">
          <div class="xp-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${rank.color}88,${rank.color});box-shadow:0 0 8px ${rank.glow}"></div>
        </div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-mini">
        <div class="stat-mini-label">Weekly XP</div>
        <div class="stat-mini-value" style="color:${weekly>0?'#4ade80':'var(--text-dim)'}">${weekly>0?'+':''}${Number(weekly).toLocaleString()}</div>
        <div class="stat-mini-sub">this week</div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label">vs Rival</div>
        <div class="stat-mini-value" style="color:${isAhead?'#4ade80':isBehind?'#f87171':'var(--blue)'}">${isAhead?'▲':isBehind?'▼':'='} ${Math.abs(myXP-rivXP).toLocaleString()}</div>
        <div class="stat-mini-sub">${isAhead?'ahead':isBehind?'behind':'tied'}</div>
      </div>
    </div>

    ${rival ? `
    <div class="section-title">Rival</div>
    <div class="rival-dash">
      <div class="rival-dash-header">
        <div class="rival-dash-name">${rival.name}</div>
        <span class="pill ${pillClass}">${pillText}</span>
      </div>
      <div class="rival-xp-row">
        <div>
          <div class="rival-xp-label">You</div>
          <div class="rival-xp-val" style="color:${isAhead?'#4ade80':isBehind?'#f87171':'var(--blue)'}">${Number(myXP).toLocaleString()}</div>
        </div>
        <div class="rival-vs">VS</div>
        <div>
          <div class="rival-xp-label">${rival.name}</div>
          <div class="rival-xp-val">${Number(rivXP).toLocaleString()}</div>
        </div>
      </div>
      ${rival.gap ? `<div class="rival-gap-row"><span>Gap</span><span class="rival-gap-val">${rival.gap}</span></div>` : ''}
    </div>` : ''}
  `;
}

function renderTasks() {
  const CATS = ['Body','Mind','Life','German'];
  const grouped = {};
  CATS.forEach(c => { grouped[c] = state.tasks.filter(t => t.cat === c); });
  const other = state.tasks.filter(t => !t.cat || !CATS.includes(t.cat));
  if (other.length) grouped['Other'] = other;

  let html = `
    <div class="action-row">
      <button class="action-btn" onclick="addDailyTasks()">
        <span class="action-icon">☀️</span>Daily Tasks
      </button>
      <button class="action-btn" onclick="addWorkout()">
        <span class="action-icon">🏋️</span>Workout
      </button>
    </div>
  `;

  if (!state.tasks.length) {
    html += '<div class="empty">No pending tasks</div>';
  } else {
    for (const [cat, tasks] of Object.entries(grouped)) {
      if (!tasks.length) continue;
      const color = CAT_COLOR[cat] ?? 'var(--text-dim)';
      html += `<div class="cat-header" style="color:${color}">
        <div class="cat-dot" style="background:${color};box-shadow:0 0 6px ${color}"></div>
        ${cat} <span style="color:var(--text-faint);font-weight:400">(${tasks.length})</span>
      </div>`;
      for (const task of tasks) {
        const overdue = task.dueDate && new Date(task.dueDate) < new Date(new Date().setHours(0,0,0,0));
        const dueStr  = task.dueDate ? new Date(task.dueDate).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : null;
        const dc = task.difficulty ? DIFF_COLOR[task.difficulty] : null;
        html += `<div class="task-item ${task.status?'done':''}" onclick="toggleTask('${task.id}',${task.status})">
          <div class="task-cb">${task.status?'✓':''}</div>
          <div class="task-body">
            <div class="task-name">${task.name||'Unnamed'}</div>
            <div class="task-tags">
              ${dc ? `<span class="tag" style="color:${dc};border-color:${dc}40;background:${dc}10">${task.difficulty}</span>` : ''}
              ${dueStr ? `<span class="tag-due ${overdue?'overdue':''}">${overdue?'⚠ ':''}${dueStr}</span>` : ''}
            </div>
          </div>
        </div>`;
      }
    }
  }
  document.getElementById('tab-tasks').innerHTML = html;
}

function renderStats() {
  const bodyStats  = state.stats.filter(s => s.cat === 'Body');
  const otherStats = state.stats.filter(s => s.cat !== 'Body');
  if (!state.stats.length) { document.getElementById('tab-stats').innerHTML = '<div class="empty">No stats found</div>'; return; }

  const cardHTML = stat => {
    const { rank, pct } = getRank(stat.finalXP);
    const lastStr = stat.lastTrained ? new Date(stat.lastTrained).toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '—';
    return `<div class="body-card">
      <div class="body-card-top">
        <span class="body-card-name">${stat.name}</span>
        <span class="body-rank" style="color:${rank.color};filter:drop-shadow(0 0 4px ${rank.color})">${rank.name}</span>
      </div>
      <div class="body-xp" style="color:${rank.color}">${Number(stat.finalXP).toLocaleString()}<span class="body-xp-unit">xp</span></div>
      <div class="body-bar"><div class="body-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${rank.color}66,${rank.color})"></div></div>
      <div class="body-last">Last: ${lastStr}</div>
    </div>`;
  };

  let html = '';
  if (bodyStats.length) html += `<div class="section-title">Body Parts</div><div class="body-grid">${bodyStats.map(cardHTML).join('')}</div>`;
  if (otherStats.length) html += `<div class="section-title">Other Stats</div><div class="body-grid">${otherStats.map(cardHTML).join('')}</div>`;
  document.getElementById('tab-stats').innerHTML = html;
}

function renderRivals() {
  if (!state.rivals.length) { document.getElementById('tab-rivals').innerHTML = '<div class="empty">No rivals found</div>'; return; }
  let html = '';
  for (const rival of state.rivals) {
    const myXP  = rival.myCurrentXP ?? 0;
    const rivXP = rival.totalXP ?? 0;
    const isAhead  = myXP > rivXP;
    const isBehind = myXP < rivXP;
    const { rank } = getRank(rivXP);
    const pillClass = isAhead ? 'pill-ahead' : isBehind ? 'pill-behind' : 'pill-tied';
    const pillText  = isAhead ? '▲ Ahead'   : isBehind ? '▼ Behind'   : 'Tied';
    html += `<div class="rival-full">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div class="rival-full-name">${rival.name}</div>
        <span class="pill ${pillClass}">${pillText}</span>
      </div>
      ${rival.personality ? `<div class="rival-personality">"${rival.personality}"</div>` : ''}
      <div class="rival-stat-grid">
        <div class="rival-stat-cell"><div class="rival-stat-label">Their XP</div><div class="rival-stat-val">${Number(rivXP).toLocaleString()}</div></div>
        <div class="rival-stat-div"></div>
        <div class="rival-stat-cell"><div class="rival-stat-label">Your XP</div><div class="rival-stat-val" style="color:${isAhead?'#4ade80':isBehind?'#f87171':'var(--blue)'}">${Number(myXP).toLocaleString()}</div></div>
        <div class="rival-stat-div"></div>
        <div class="rival-stat-cell"><div class="rival-stat-label">Their Rank</div><div class="rival-stat-val" style="color:${rank.color}">${rival.rank||rank.name}</div></div>
      </div>
      ${rival.gap ? `<div class="rival-gap-row"><span>Gap</span><span class="rival-gap-val">${rival.gap}</span></div>` : ''}
    </div>`;
  }
  document.getElementById('tab-rivals').innerHTML = html;
}

// ── Actions ──
async function toggleTask(taskId, currentStatus) {
  const newStatus = !currentStatus;
  state.tasks = state.tasks.map(t => t.id === taskId ? {...t, status: newStatus} : t);
  renderTasks();
  try {
    await notionPatch(taskId, { Status: { checkbox: newStatus } });
    showToast(newStatus ? '✓ Quest complete' : 'Task reopened');
    if (newStatus) {
      setTimeout(() => { state.tasks = state.tasks.filter(t => t.id !== taskId); renderTasks(); }, 600);
    }
  } catch(e) {
    state.tasks = state.tasks.map(t => t.id === taskId ? {...t, status: currentStatus} : t);
    renderTasks(); showToast('Update failed');
  }
}

async function addDailyTasks() {
  const today = new Date().toISOString().split('T')[0];
  const daily = state.templates.filter(t => t.type === 'Daily');
  if (!daily.length) { showToast('No daily templates found'); return; }
  try {
    await Promise.all(daily.map(t => notionCreate(DB.tasks, {
      Task:       { title:[{ text:{ content:t.name } }] },
      ...(t.cat ? { Cat:{ select:{ name:t.cat } } } : {}),
      Difficulty: { select:{ name:'Daily' } },
      Status:     { checkbox:false },
      'Due Date': { date:{ start:today } },
    })));
    showToast(`${daily.length} daily tasks added`);
    await loadTasks(); renderTasks();
  } catch(e) { showToast('Failed to add tasks'); }
}

async function addWorkout() {
  const today = new Date().toISOString().split('T')[0];
  const workout = state.templates.filter(t => t.type === 'Weekly' || t.cat === 'Body');
  if (!workout.length) { showToast('No workout templates found'); return; }
  try {
    await Promise.all(workout.map(t => notionCreate(DB.tasks, {
      Task:       { title:[{ text:{ content:t.name } }] },
      Cat:        { select:{ name:'Body' } },
      Difficulty: { select:{ name:'Heavy' } },
      Status:     { checkbox:false },
      'Due Date': { date:{ start:today } },
    })));
    showToast(`${workout.length} workout tasks added`);
    await loadTasks(); renderTasks();
  } catch(e) { showToast('Failed to add workout'); }
}

// Init
refresh();
</script>
</body>
</html>
